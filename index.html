<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Измени персонажа</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@700&family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #161513;
            --bg-panel: #23221f;
            --gold: #dfb23e;
            --gold-hover: #f1c75c;
            --text-light: #e0e0e0;
            --font-heading: 'Cormorant Garamond', serif;
            --font-main: 'Montserrat', sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-light);
            font-family: var(--font-main);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-image: radial-gradient(circle at 50% 0%, #302a1c 0%, var(--bg-dark) 60%);
        }

        .editor-container {
            background-color: var(--bg-panel);
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8), 0 0 15px rgba(223, 178, 62, 0.1);
            max-width: 600px;
            width: 100%;
            text-align: center;
        }

        h1 {
            font-family: var(--font-heading);
            color: var(--gold);
            font-size: 3em;
            margin-top: 0;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            letter-spacing: 2px;
        }

        p.subtitle {
            font-size: 0.9em;
            color: #a0a0a0;
            margin-bottom: 30px;
        }

        .controls {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-bottom: 30px;
        }

        input[type="file"] {
            display: none;
        }

        .custom-file-upload {
            border: 2px dashed var(--gold);
            padding: 20px;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.3s;
            color: var(--gold);
            font-weight: 600;
        }

        .custom-file-upload:hover {
            background-color: rgba(223, 178, 62, 0.1);
        }

        select {
            width: 100%;
            padding: 15px;
            background-color: var(--bg-dark);
            color: var(--text-light);
            border: 1px solid #444;
            border-radius: 25px;
            font-family: var(--font-main);
            font-size: 1em;
            outline: none;
            cursor: pointer;
            appearance: none;
            text-align: center;
        }

        .preview-box {
            width: 100%;
            height: 350px;
            background-color: #000;
            border-radius: 10px;
            margin-bottom: 30px;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            border: 1px solid #333;
            position: relative;
            background-image: linear-gradient(45deg, #111 25%, transparent 25%), 
                              linear-gradient(-45deg, #111 25%, transparent 25%), 
                              linear-gradient(45deg, transparent 75%, #111 75%), 
                              linear-gradient(-45deg, transparent 75%, #111 75%);
            background-size: 20px 20px;
            background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
        }

        canvas {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .placeholder-text {
            position: absolute;
            color: #555;
            font-size: 0.9em;
            background: rgba(0,0,0,0.7);
            padding: 5px 15px;
            border-radius: 10px;
        }

        button {
            background-color: var(--gold);
            color: #000;
            border: none;
            padding: 15px 30px;
            border-radius: 30px;
            font-family: var(--font-main);
            font-weight: 600;
            font-size: 1em;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%;
            margin-bottom: 15px;
            box-shadow: 0 4px 10px rgba(223, 178, 62, 0.3);
        }

        button:hover {
            background-color: var(--gold-hover);
            transform: translateY(-2px);
        }

        button:disabled {
            background-color: #555;
            color: #888;
            cursor: not-allowed;
            box-shadow: none;
            transform: none;
        }

        #downloadBtn {
            display: none;
            background-color: transparent;
            color: var(--gold);
            border: 2px solid var(--gold);
        }

        #downloadBtn:hover {
            background-color: var(--gold);
            color: #000;
        }
    </style>
</head>
<body>

<div class="editor-container">
    <h1>Измени персонажа</h1>
    <p class="subtitle">Загрузите изображение на прозрачном фоне и выберите стиль магии</p>

    <div class="controls">
        <label class="custom-file-upload">
            <input type="file" id="imageUpload" accept="image/png, image/jpeg">
            <span id="fileName">📁 Выбрать картинку с устройства</span>
        </label>

        <select id="styleSelect">
            <option value="none">Оригинал (Без стиля)</option>
            <option value="pixel">👾 8-bit Пиксель-арт</option>
            <option value="gameboy">🎮 Ретро GameBoy</option>
            <option value="sketch">✏️ Карандашный скетч</option>
            <option value="popart">🎨 Поп-арт (Комикс)</option>
            <option value="cyberpunk">🌃 Киберпанк-неон</option>
            <option value="silhouette">🥷 Силуэт ниндзя</option>
        </select>
    </div>

    <div class="preview-box">
        <span class="placeholder-text" id="placeholder">Предпросмотр</span>
        <canvas id="canvas"></canvas>
    </div>

    <button id="processBtn" disabled>Обработать картинку</button>
    <button id="downloadBtn">Скачать файл на устройство</button>
</div>

<script>
    const imageUpload = document.getElementById('imageUpload');
    const fileName = document.getElementById('fileName');
    const styleSelect = document.getElementById('styleSelect');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d', { willReadFrequently: true });
    const processBtn = document.getElementById('processBtn');
    const downloadBtn = document.getElementById('downloadBtn');
    const placeholder = document.getElementById('placeholder');

    let originalImage = new Image();
    let isImageLoaded = false;
    let maxCanvasSize = 800; // Ограничение размера для скорости обработки

    // Загрузка картинки
    imageUpload.addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (file) {
            fileName.textContent = '📁 ' + file.name;
            const reader = new FileReader();
            reader.onload = function(event) {
                originalImage.onload = function() {
                    // Масштабируем, если картинка слишком большая
                    let scale = Math.min(maxCanvasSize / originalImage.width, maxCanvasSize / originalImage.height, 1);
                    canvas.width = originalImage.width * scale;
                    canvas.height = originalImage.height * scale;
                    
                    isImageLoaded = true;
                    placeholder.style.display = 'none';
                    
                    // Сразу применяем выбранный стиль при загрузке
                    applyStyle(styleSelect.value);
                    resetButtons();
                }
                originalImage.src = event.target.result;
            }
            reader.readAsDataURL(file);
        }
    });

    // МОМЕНТАЛЬНЫЙ ПРЕДПРОСМОТР ПРИ ВЫБОРЕ СТИЛЯ
    styleSelect.addEventListener('change', () => {
        if (!isImageLoaded) return;
        applyStyle(styleSelect.value); // Применяем сразу!
        resetButtons(); // Сбрасываем кнопки
    });

    function resetButtons() {
        processBtn.textContent = 'Обработать картинку';
        processBtn.disabled = false;
        downloadBtn.style.display = 'none';
    }

    // Обработка (Финализация)
    processBtn.addEventListener('click', function() {
        if (!isImageLoaded) return;
        processBtn.textContent = 'Колдуем... ⚡';
        processBtn.disabled = true;

        setTimeout(() => {
            processBtn.textContent = '✨ Обработано';
            downloadBtn.style.display = 'block';
        }, 800);
    });

    // --- МАТЕМАТИЧЕСКИЕ ФИЛЬТРЫ ---
    function applyStyle(style) {
        // Очистка и сброс
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.filter = 'none';
        ctx.shadowBlur = 0;
        ctx.globalCompositeOperation = 'source-over';
        ctx.imageSmoothingEnabled = true;

        // Рисуем базу
        ctx.drawImage(originalImage, 0, 0, canvas.width, canvas.height);

        if (style === 'none') return;

        // Если стиль требует манипуляции с пикселями
        if (['pixel', 'gameboy', 'popart'].includes(style)) {
            let pixelSize = style === 'pixel' ? 6 : (style === 'gameboy' ? 8 : 1);
            
            // Пикселизация
            if (pixelSize > 1) {
                const w = canvas.width / pixelSize;
                const h = canvas.height / pixelSize;
                ctx.drawImage(originalImage, 0, 0, w, h);
                ctx.imageSmoothingEnabled = false;
                ctx.drawImage(canvas, 0, 0, w, h, 0, 0, canvas.width, canvas.height);
            }

            // Манипуляция цветом (Постеризация / Геймбой)
            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const data = imageData.data;

            for (let i = 0; i < data.length; i += 4) {
                if (data[i + 3] < 50) continue; // Пропускаем прозрачные пиксели

                let r = data[i];
                let g = data[i + 1];
                let b = data[i + 2];

                if (style === 'pixel' || style === 'popart') {
                    // Жесткое сокращение цветов (постеризация)
                    let levels = style === 'popart' ? 3 : 5; 
                    let factor = 255 / (levels - 1);
                    data[i] = Math.round(r / 255 * (levels - 1)) * factor;
                    data[i+1] = Math.round(g / 255 * (levels - 1)) * factor;
                    data[i+2] = Math.round(b / 255 * (levels - 1)) * factor;
                    
                    if(style === 'popart') { // Кислотные цвета для поп-арта
                        data[i] = Math.min(255, data[i] * 1.5);
                        data[i+1] = Math.max(0, data[i+1] - 50);
                    }
                } 
                else if (style === 'gameboy') {
                    // Палитра GameBoy (4 оттенка зеленого)
                    let avg = (r + g + b) / 3;
                    if (avg < 64) { data[i]=15; data[i+1]=56; data[i+2]=15; }
                    else if (avg < 128) { data[i]=48; data[i+1]=98; data[i+2]=48; }
                    else if (avg < 192) { data[i]=139; data[i+1]=172; data[i+2]=15; }
                    else { data[i]=155; data[i+1]=188; data[i+2]=15; }
                }
            }
            ctx.putImageData(imageData, 0, 0);
        }

        // Фильтры через Canvas API
        switch (style) {
            case 'sketch':
                ctx.filter = 'grayscale(100%) contrast(200%) brightness(120%)';
                ctx.drawImage(originalImage, 0, 0, canvas.width, canvas.height);
                break;
            case 'cyberpunk':
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                // Создаем неоновое свечение
                ctx.shadowColor = '#ff00ff';
                ctx.shadowBlur = 20;
                ctx.filter = 'saturate(300%) hue-rotate(90deg) contrast(150%) invert(20%)';
                ctx.drawImage(originalImage, 0, 0, canvas.width, canvas.height);
                break;
            case 'silhouette':
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.shadowColor = '#dfb23e'; // Золотая аура
                ctx.shadowBlur = 15;
                ctx.drawImage(originalImage, 0, 0, canvas.width, canvas.height);
                // Заливаем саму форму черным
                ctx.globalCompositeOperation = 'source-in';
                ctx.fillStyle = '#050505';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.globalCompositeOperation = 'source-over';
                break;
        }
    }

    // Скачивание файла
    downloadBtn.addEventListener('click', function() {
        const link = document.createElement('a');
        link.download = 'magic_character.png'; 
        link.href = canvas.toDataURL('image/png');
        link.click();
    });
</script>

</body>
</html>
