<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Продвинутый редактор персонажа</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@700&family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #121110;
            --bg-panel: #1e1d1a;
            --gold: #dfb23e;
            --gold-hover: #f1c75c;
            --text-light: #e0e0e0;
            --font-heading: 'Cormorant Garamond', serif;
            --font-main: 'Montserrat', sans-serif;
            --anim-speed: 2s; /* Базовая скорость анимации */
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-light);
            font-family: var(--font-main);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            background-image: radial-gradient(circle at 50% 0%, #302a1c 0%, var(--bg-dark) 70%);
        }

        .editor-container {
            background-color: var(--bg-panel);
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.9), 0 0 20px rgba(223, 178, 62, 0.15);
            width: 95%;
            max-width: 1300px;
            height: 92vh;
            display: flex;
            gap: 25px;
            box-sizing: border-box;
        }

        /* ЛЕВАЯ ПАНЕЛЬ */
        .left-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            padding-right: 15px;
            gap: 15px;
        }

        .left-panel::-webkit-scrollbar { width: 6px; }
        .left-panel::-webkit-scrollbar-track { background: #1a1a1a; border-radius: 10px; }
        .left-panel::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 10px; }

        /* ПРАВАЯ ПАНЕЛЬ */
        .right-panel {
            flex: 1.3;
            display: flex;
            flex-direction: column;
        }

        h1 {
            font-family: var(--font-heading);
            color: var(--gold);
            font-size: 2em;
            margin: 0 0 5px 0;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        p.subtitle { font-size: 0.8em; color: #a0a0a0; margin: 0 0 15px 0; }

        fieldset {
            border: 1px solid #444;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 10px;
            background: rgba(0,0,0,0.2);
        }

        legend {
            color: var(--gold);
            font-weight: 600;
            font-size: 0.9em;
            padding: 0 10px;
        }

        .controls { display: flex; flex-direction: column; gap: 12px; }

        input[type="file"] { display: none; }

        .custom-file-upload {
            border: 2px dashed var(--gold);
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
            color: var(--gold);
            font-weight: 600;
            text-align: center;
            display: block;
        }

        .custom-file-upload:hover { background-color: rgba(223, 178, 62, 0.1); }

        select {
            width: 100%;
            padding: 10px;
            background-color: #111;
            color: var(--text-light);
            border: 1px solid #555;
            border-radius: 8px;
            font-family: var(--font-main);
            font-size: 0.85em;
            outline: none;
            cursor: pointer;
        }

        .slider-group { display: flex; flex-direction: column; gap: 5px; margin-bottom: 10px;}
        .slider-group label { font-size: 0.8em; color: #ccc; display: flex; justify-content: space-between; }

        input[type=range] { -webkit-appearance: none; width: 100%; background: transparent; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 14px; width: 14px; border-radius: 50%; background: var(--gold); cursor: pointer; margin-top: -5px; }
        input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 4px; background: #555; border-radius: 2px; }

        .color-picker-group { display: flex; justify-content: space-between; align-items: center; font-size: 0.85em; }
        input[type="color"] { border: none; width: 40px; height: 30px; border-radius: 5px; cursor: pointer; background: none; }
        input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
        input[type="color"]::-webkit-color-swatch { border: 1px solid #666; border-radius: 5px; }

        .checkbox-group { display: flex; align-items: center; gap: 10px; font-size: 0.85em; cursor: pointer; color: #ccc;}

        .buttons-group { margin-top: auto; display: flex; flex-direction: column; gap: 10px; }
        button {
            background-color: var(--gold); color: #000; border: none; padding: 12px; border-radius: 8px;
            font-family: var(--font-main); font-weight: 600; cursor: pointer; transition: 0.3s;
        }
        button:hover { background-color: var(--gold-hover); transform: translateY(-2px); }
        button:disabled { background-color: #444; color: #777; cursor: not-allowed; transform: none; }

        .btn-outline { background-color: transparent; color: var(--gold); border: 2px solid var(--gold); display: none; }
        .btn-outline:hover { background-color: var(--gold); color: #000; }

        /* ПРЕВЬЮ И АНИМАЦИИ */
        .preview-box {
            width: 100%; height: 100%; background-color: #000; border-radius: 10px; display: flex;
            justify-content: center; align-items: center; overflow: hidden; position: relative;
            background-image: linear-gradient(45deg, #111 25%, transparent 25%), linear-gradient(-45deg, #111 25%, transparent 25%), linear-gradient(45deg, transparent 75%, #111 75%), linear-gradient(-45deg, transparent 75%, #111 75%);
            background-size: 20px 20px; background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
            border: 1px solid #333;
        }

        #canvasWrapper {
            display: flex; justify-content: center; align-items: center; width: 100%; height: 100%; transition: all 0.3s ease;
        }

        canvas { max-width: 90%; max-height: 90%; object-fit: contain; transition: all 0.3s ease; cursor: pointer;}

        .placeholder-text { position: absolute; color: #666; background: rgba(0,0,0,0.8); padding: 10px 20px; border-radius: 10px; font-size: 0.9em;}

        /* ПОСТОЯННЫЕ АНИМАЦИИ */
        .anim-float { animation: float var(--anim-speed) ease-in-out infinite; }
        .anim-pulse { animation: pulse calc(var(--anim-speed) / 1.5) infinite; }
        .anim-breathe { animation: breathe var(--anim-speed) ease-in-out infinite; }
        .anim-wobble { animation: wobble var(--anim-speed) ease-in-out infinite; }
        .anim-glitch { animation: glitch calc(var(--anim-speed) / 6) linear infinite; }
        .anim-spin { animation: spin var(--anim-speed) linear infinite; }
        .anim-neon { animation: neon calc(var(--anim-speed) / 1.5) alternate infinite; }
        .anim-swing { animation: swing var(--anim-speed) ease-in-out infinite; transform-origin: top center; }
        .anim-shake { animation: shake calc(var(--anim-speed) / 4) infinite; }
        .anim-ghost { animation: ghost var(--anim-speed) infinite alternate; }

        /* АНИМАЦИИ ПРИ НАВЕДЕНИИ */
        .hover-zoom:hover { transform: scale(1.15) !important; }
        .hover-blur:hover { filter: blur(5px); }
        .hover-tilt:hover { transform: rotate(15deg) scale(1.05) !important; }
        .hover-squeeze:hover { transform: scaleY(0.8) scaleX(1.2) !important; }
        .hover-neon:hover { animation: neon calc(var(--anim-speed) / 2) alternate infinite; }
        .hover-shake:hover { animation: shake 0.3s infinite; }

        /* АНИМАЦИИ ПО КЛИКУ (применяются через класс в JS) */
        .click-bounce-trigger { animation: bounce 0.5s ease forwards !important; }
        .click-spin-trigger { animation: spin 0.6s cubic-bezier(0.4, 0, 0.2, 1) forwards !important; }
        .click-squish-trigger { animation: squish 0.3s forwards !important; }
        .click-vanish-trigger { animation: vanish 0.5s forwards !important; }
        .click-flip-trigger { animation: flip 0.6s forwards !important; }
        .click-glitch-trigger { animation: glitch 0.3s linear infinite !important; }

        /* KEYFRAMES */
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.08); filter: brightness(130%); } 100% { transform: scale(1); } }
        @keyframes breathe { 0%, 100% { transform: scaleY(1) scaleX(1); } 50% { transform: scaleY(1.05) scaleX(0.98); } }
        @keyframes wobble { 0%, 100% { transform: rotate(0deg); } 25% { transform: rotate(-5deg); } 75% { transform: rotate(5deg); } }
        @keyframes glitch { 0% { transform: translate(0) } 20% { transform: translate(-3px, 3px) } 40% { transform: translate(-3px, -3px) } 60% { transform: translate(3px, 3px) } 80% { transform: translate(3px, -3px) } 100% { transform: translate(0) } }
        @keyframes bounce { 0% { transform: translateY(0); } 40% { transform: translateY(-60px) scaleY(1.1); } 100% { transform: translateY(0) scaleY(1); } }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        @keyframes neon { 0% { filter: brightness(100%) drop-shadow(0 0 5px var(--gold)); } 100% { filter: brightness(150%) drop-shadow(0 0 20px var(--gold)); } }
        @keyframes swing { 20% { transform: rotate(15deg); } 40% { transform: rotate(-10deg); } 60% { transform: rotate(5deg); } 80% { transform: rotate(-5deg); } 100% { transform: rotate(0deg); } }
        @keyframes shake { 0%, 100% {transform: translateX(0);} 25% {transform: translateX(-5px);} 75% {transform: translateX(5px);} }
        @keyframes ghost { 0% { opacity: 1; filter: grayscale(0%);} 100% { opacity: 0.3; filter: grayscale(80%) blur(2px);} }
        @keyframes squish { 0% { transform: scale(1); } 50% { transform: scaleY(0.4) scaleX(1.5) translateY(30%); } 100% { transform: scale(1); } }
        @keyframes vanish { 0% { opacity: 1; transform: scale(1); } 100% { opacity: 0; transform: scale(2); } }
        @keyframes flip { 0% { transform: perspective(400px) rotateY(0deg); } 100% { transform: perspective(400px) rotateY(360deg); } }

    </style>
</head>
<body>

<div class="editor-container">
    <!-- ЛЕВАЯ КОЛОНКА -->
    <div class="left-panel">
        <div>
            <h1>Редактор персонажа</h1>
            <p class="subtitle">Настрой стиль, цвет и выбери эффекты анимации</p>

            <label class="custom-file-upload">
                <input type="file" id="imageUpload" accept="image/png, image/jpeg, image/webp">
                <span id="fileName">📁 Загрузить картинку (без фона)</span>
            </label>

            <!-- БЛОК: ВНЕШНИЙ ВИД -->
            <fieldset>
                <legend>Внешний вид и фильтры</legend>
                <div class="controls">
                    <select id="styleSelect">
                        <option value="none">Оригинал (Без стиля)</option>
                        <option value="pixel">👾 8-bit Пиксель-арт</option>
                        <option value="sketch">✏️ Карандашный скетч</option>
                        <option value="cyberpunk">🌃 Киберпанк-неон</option>
                        <option value="hologram">💿 Голограмма</option>
                        <option value="silhouette">🥷 Силуэт ниндзя</option>
                        <option value="ghost">👻 Призрак</option>
                        <option value="thermal">🌡️ Тепловизор (Хищник)</option>
                        <option value="acid">🍄 Кислотный трип</option>
                        <option value="gold">🏆 Золотая статуя</option>
                        <option value="ice">❄️ Ледяной кристалл</option>
                        <option value="crt">📺 Ретро CRT-монитор</option>
                    </select>

                    <label class="checkbox-group">
                        <input type="checkbox" id="flipCheck"> Отразить по горизонтали (поворот)
                    </label>

                    <div class="slider-group">
                        <label>Прозрачность <span id="opacityVal">100%</span></label>
                        <input type="range" id="opacitySlider" min="10" max="100" value="100">
                    </div>
                    <div class="slider-group">
                        <label>Яркость <span id="brightVal">100%</span></label>
                        <input type="range" id="brightnessSlider" min="10" max="250" value="100">
                    </div>
                </div>
            </fieldset>

            <!-- БЛОК: СВЕЧЕНИЕ -->
            <fieldset>
                <legend>Магическое свечение</legend>
                <div class="controls">
                    <div class="slider-group">
                        <label>Интенсивность <span id="glowVal">0</span></label>
                        <input type="range" id="glowSlider" min="0" max="80" value="0">
                    </div>
                    <div class="color-picker-group">
                        <label for="glowColor">Цвет (кликни для пипетки):</label>
                        <input type="color" id="glowColor" value="#dfb23e" title="Выберите цвет или используйте пипетку">
                    </div>
                </div>
            </fieldset>

            <!-- БЛОК: АНИМАЦИЯ -->
            <fieldset>
                <legend>Анимации (Компьютерные игры)</legend>
                <div class="controls">
                    <div class="slider-group">
                        <label>Скорость анимации <span id="speedVal">Нормальная</span></label>
                        <input type="range" id="animSpeed" min="0.2" max="4" step="0.1" value="2" dir="rtl">
                    </div>

                    <select id="animContinuous">
                        <option value="none">Покой (Без постоянной)</option>
                        <option value="anim-float">🎈 Парение (Полет)</option>
                        <option value="anim-pulse">💓 Пульс (Сердцебиение)</option>
                        <option value="anim-shake">🫨 Тряска (Землетрясение)</option>
                        <option value="anim-glitch">⚡ Глюк (Системная ошибка)</option>
                        <option value="anim-spin">🌪️ Вращение (Водоворот)</option>
                        <option value="anim-neon">🌟 Неон (Сияние)</option>
                        <option value="anim-wobble">🥴 Шатание (Оглушение)</option>
                        <option value="anim-swing">🕰️ Качание (Маятник)</option>
                        <option value="anim-breathe">🫁 Дыхание (AFK)</option>
                        <option value="anim-ghost">👻 Призрак (Мерцание)</option>
                    </select>

                    <select id="animHover">
                        <option value="none">Без анимации при наведении</option>
                        <option value="hover-zoom">🔍 Увеличение (Zoom)</option>
                        <option value="hover-tilt">🔄 Наклон вперед</option>
                        <option value="hover-squeeze">🥞 Сплющивание</option>
                        <option value="hover-blur">🌫️ Размытие (Скрытность)</option>
                        <option value="hover-neon">✨ Магический отклик (Неон)</option>
                        <option value="hover-shake">💥 Дрожь (Агро)</option>
                    </select>

                    <select id="animClick">
                        <option value="none">Без анимации по клику</option>
                        <option value="click-bounce">🦘 Прыжок (Уклонение)</option>
                        <option value="click-spin">🔄 Сальто 360 (Перекат)</option>
                        <option value="click-squish">🔨 Удар молотком (Стан)</option>
                        <option value="click-flip">🎭 Переворот (Смена стойки)</option>
                        <option value="click-vanish">💨 Исчезновение (ТП)</option>
                        <option value="click-glitch">💻 Критический сбой</option>
                    </select>
                </div>
            </fieldset>
        </div>

        <div class="buttons-group">
            <button id="processBtn" disabled>Сгенерировать картинку</button>
            <button id="downloadBtn" class="btn-outline">Скачать (Оригинал)</button>
            <button id="geniallyBtn" class="btn-outline">Скопировать код для Genially 🧬</button>
        </div>
    </div>

    <!-- ПРАВАЯ КОЛОНКА -->
    <div class="right-panel">
        <div class="preview-box">
            <span class="placeholder-text" id="placeholder">Загрузите картинку</span>
            <div id="canvasWrapper">
                <canvas id="canvas"></canvas>
            </div>
        </div>
    </div>
</div>

<script>
    const imageUpload = document.getElementById('imageUpload');
    const fileName = document.getElementById('fileName');
    const styleSelect = document.getElementById('styleSelect');
    const flipCheck = document.getElementById('flipCheck');
    const canvas = document.getElementById('canvas');
    const canvasWrapper = document.getElementById('canvasWrapper');
    const ctx = canvas.getContext('2d', { willReadFrequently: true });
    
    // Элементы управления
    const processBtn = document.getElementById('processBtn');
    const downloadBtn = document.getElementById('downloadBtn');
    const geniallyBtn = document.getElementById('geniallyBtn');
    const placeholder = document.getElementById('placeholder');
    
    const brightnessSlider = document.getElementById('brightnessSlider');
    const opacitySlider = document.getElementById('opacitySlider');
    const glowSlider = document.getElementById('glowSlider');
    const glowColor = document.getElementById('glowColor');
    const animSpeed = document.getElementById('animSpeed');
    
    const brightVal = document.getElementById('brightVal');
    const opacityVal = document.getElementById('opacityVal');
    const glowVal = document.getElementById('glowVal');
    const speedVal = document.getElementById('speedVal');

    const animContinuous = document.getElementById('animContinuous');
    const animHover = document.getElementById('animHover');
    const animClick = document.getElementById('animClick');

    let originalImage = new Image();
    let isImageLoaded = false;
    
    // МАКСИМАЛЬНЫЙ размер для веба/Genially, чтобы код был легким
    let maxCanvasSize = 600; 

    // Загрузка картинки
    imageUpload.addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (file) {
            let displayName = file.name.length > 25 ? file.name.substring(0, 22) + '...' : file.name;
            fileName.textContent = '📁 ' + displayName;

            const reader = new FileReader();
            reader.onload = function(event) {
                originalImage.onload = function() {
                    let scale = Math.min(maxCanvasSize / originalImage.width, maxCanvasSize / originalImage.height, 1);
                    canvas.width = originalImage.width * scale;
                    canvas.height = originalImage.height * scale;
                    isImageLoaded = true;
                    placeholder.style.display = 'none';
                    applyStyle();
                    resetButtons();
                }
                originalImage.src = event.target.result;
            }
            reader.readAsDataURL(file);
        }
    });

    // Обновление интерфейса и рендер
    const updateInputs = () => {
        if (!isImageLoaded) return;
        brightVal.textContent = brightnessSlider.value + '%';
        opacityVal.textContent = opacitySlider.value + '%';
        glowVal.textContent = glowSlider.value;
        
        let s = animSpeed.value;
        speedVal.textContent = s < 1 ? "Медленно" : (s > 2.5 ? "Быстро" : "Нормальная");
        document.documentElement.style.setProperty('--anim-speed', `${s}s`);
        
        applyStyle();
        resetButtons();
    };

    [styleSelect, flipCheck, brightnessSlider, opacitySlider, glowSlider, glowColor, animSpeed].forEach(el => {
        el.addEventListener('input', updateInputs);
    });

    // Применение постоянных и ховер анимаций
    const updateAnimations = () => {
        canvasWrapper.className = '';
        canvas.className = '';
        if (animContinuous.value !== 'none') canvasWrapper.classList.add(animContinuous.value);
        if (animHover.value !== 'none') canvas.classList.add(animHover.value);
    };

    [animContinuous, animHover, animClick].forEach(el => {
        el.addEventListener('change', updateAnimations);
    });

    // Логика анимации по КЛИКУ
    canvas.addEventListener('click', () => {
        if(animClick.value === 'none') return;
        
        let clickClass = animClick.value + '-trigger';
        // Сброс класса для возможности повторного клика
        canvas.classList.remove(clickClass);
        void canvas.offsetWidth; // Магия браузера для перезапуска CSS
        canvas.classList.add(clickClass);
        
        // Очищаем класс после завершения (берем с запасом 1 секунду)
        setTimeout(() => {
            canvas.classList.remove(clickClass);
        }, 1000);
    });

    // Пресеты при смене стиля
    styleSelect.addEventListener('change', () => {
        const s = styleSelect.value;
        if(s === 'cyberpunk') { glowColor.value = '#ff00ff'; glowSlider.value = 25; brightnessSlider.value = 110;}
        else if(s === 'ghost') { glowColor.value = '#00ffff'; glowSlider.value = 20; opacitySlider.value = 60;}
        else if(s === 'hologram') { glowColor.value = '#0088ff'; glowSlider.value = 15; opacitySlider.value = 80;}
        else if(s === 'gold') { glowColor.value = '#ffd700'; glowSlider.value = 10; brightnessSlider.value = 120; opacitySlider.value = 100;}
        else if(s === 'acid') { glowColor.value = '#39ff14'; glowSlider.value = 30; brightnessSlider.value = 150; opacitySlider.value = 100;}
        else if(s === 'ice') { glowColor.value = '#a5f2f3'; glowSlider.value = 25; brightnessSlider.value = 130; opacitySlider.value = 90;}
        else if(s === 'thermal') { glowColor.value = '#ff0000'; glowSlider.value = 10;}
        else { glowSlider.value = 0; brightnessSlider.value = 100; opacitySlider.value = 100; }
        updateInputs();
    });

    function resetButtons() {
        processBtn.textContent = 'Сгенерировать картинку';
        processBtn.disabled = false;
        downloadBtn.style.display = 'none';
        geniallyBtn.style.display = 'none';
    }

    processBtn.addEventListener('click', function() {
        if (!isImageLoaded) return;
        processBtn.textContent = 'Обработка пикселей... ⚡';
        processBtn.disabled = true;
        setTimeout(() => {
            processBtn.textContent = '✨ Готово!';
            downloadBtn.style.display = 'block';
            geniallyBtn.style.display = 'block';
        }, 600);
    });

    // МАТЕМАТИКА ОТРИСОВКИ
    function applyStyle() {
        if (!isImageLoaded) return;

        const style = styleSelect.value;
        const brightness = brightnessSlider.value;
        const opacity = opacitySlider.value / 100;
        const glowV = glowSlider.value;
        const glowC = glowColor.value;
        const isFlipped = flipCheck.checked;

        const tempCanvas = document.createElement('canvas');
        tempCanvas.width = canvas.width;
        tempCanvas.height = canvas.height;
        const tempCtx = tempCanvas.getContext('2d');

        if (isFlipped) {
            tempCtx.translate(canvas.width, 0);
            tempCtx.scale(-1, 1);
        }

        let filterStr = `brightness(${brightness}%)`;
        
        if (style === 'sketch') filterStr += ` grayscale(100%) contrast(200%)`;
        if (style === 'cyberpunk') filterStr += ` saturate(300%) hue-rotate(90deg) contrast(150%) invert(10%)`;
        if (style === 'ghost') filterStr += ` invert(80%) grayscale(50%) hue-rotate(180deg) blur(1px)`;
        if (style === 'hologram') filterStr += ` sepia(100%) hue-rotate(180deg) saturate(300%) contrast(150%)`;
        if (style === 'thermal') filterStr += ` invert(100%) hue-rotate(180deg) saturate(500%) contrast(200%)`;
        if (style === 'acid') filterStr += ` saturate(500%) hue-rotate(270deg) contrast(200%) invert(20%)`;
        if (style === 'gold') filterStr += ` sepia(100%) contrast(150%) saturate(200%) hue-rotate(15deg) drop-shadow(2px 4px 6px black)`;
        if (style === 'ice') filterStr += ` sepia(100%) hue-rotate(180deg) saturate(100%) contrast(120%) brightness(150%)`;
        if (style === 'crt') filterStr += ` saturate(200%) contrast(150%) blur(0.5px)`;

        tempCtx.filter = filterStr;
        tempCtx.globalAlpha = opacity;
        tempCtx.drawImage(originalImage, 0, 0, canvas.width, canvas.height);
        tempCtx.globalAlpha = 1.0; 
        tempCtx.filter = 'none';

        if (style === 'pixel') {
            let pSize = 4;
            const w = Math.ceil(canvas.width / pSize);
            const h = Math.ceil(canvas.height / pSize);
            const tinyC = document.createElement('canvas');
            tinyC.width = w; tinyC.height = h;
            tinyC.getContext('2d').drawImage(tempCanvas, 0, 0, w, h);
            
            tempCtx.clearRect(0, 0, canvas.width, canvas.height);
            tempCtx.imageSmoothingEnabled = false;
            tempCtx.drawImage(tinyC, 0, 0, w, h, 0, 0, canvas.width, canvas.height);
        } 
        else if (style === 'silhouette') {
            tempCtx.globalCompositeOperation = 'source-in';
            tempCtx.fillStyle = '#050505';
            tempCtx.fillRect(0, 0, canvas.width, canvas.height);
            tempCtx.globalCompositeOperation = 'source-over';
        } 
        else if (style === 'hologram' || style === 'crt') {
            tempCtx.globalCompositeOperation = 'source-atop';
            tempCtx.fillStyle = style === 'hologram' ? 'rgba(0, 255, 255, 0.15)' : 'rgba(0,0,0,0.3)';
            let step = style === 'hologram' ? 4 : 3;
            for(let y = 0; y < canvas.height; y += step) {
                tempCtx.fillRect(0, y, canvas.width, 1.5);
            }
            if (style === 'crt') {
                tempCtx.globalCompositeOperation = 'screen';
                tempCtx.fillStyle = 'rgba(255,0,0,0.1)';
                tempCtx.fillRect(2, 0, canvas.width, canvas.height);
                tempCtx.fillStyle = 'rgba(0,0,255,0.1)';
                tempCtx.fillRect(-2, 0, canvas.width, canvas.height);
            }
            tempCtx.globalCompositeOperation = 'source-over';
        }

        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.shadowColor = glowV > 0 ? glowC : 'transparent';
        ctx.shadowBlur = parseInt(glowV);
        ctx.imageSmoothingEnabled = true;

        ctx.setTransform(1, 0, 0, 1, 0, 0); 
        ctx.drawImage(tempCanvas, 0, 0, canvas.width, canvas.height);
    }

    // СКАЧАТЬ КАРТИНКУ
    downloadBtn.addEventListener('click', function() {
        const link = document.createElement('a');
        link.download = 'magic_character.webp'; 
        link.href = canvas.toDataURL('image/webp', 0.9);
        link.click();
    });

    // ГЕНЕРАТОР КОДА ДЛЯ GENIALLY
    geniallyBtn.addEventListener('click', function() {
        // Ужимаем до качества 0.7, чтобы код не был слишком длинным (Genially имеет лимиты)
        const base64Image = canvas.toDataURL('image/webp', 0.7);
        
        const cont = animContinuous.value;
        const hov = animHover.value;
        const clk = animClick.value;
        const speed = animSpeed.value;
        
        // Магия JS для клика в Genially (если выбрана анимация)
        let clickScript = "";
        if(clk !== 'none') {
            let animName = clk.replace('click-', '');
            // Особые настройки времени для разных клик-анимаций
            let t = "0.5s ease forwards";
            if(animName === 'spin') t = "0.6s cubic-bezier(0.4, 0, 0.2, 1) forwards";
            if(animName === 'squish') t = "0.3s forwards";
            if(animName === 'vanish') t = "0.5s forwards";
            if(animName === 'flip') t = "0.6s forwards";
            if(animName === 'glitch') t = "0.3s linear infinite";

            clickScript = `onclick="this.style.animation='none'; void this.offsetWidth; this.style.animation='${animName} ${t}'; setTimeout(()=>{this.style.animation=''}, 1000);"`;
        }

        // Формируем полностью автономный кусок HTML для вставки
        const geniallyCode = `
<style>
  .g-wrap { display: flex; justify-content: center; align-items: center; width: 100%; height: 100%; --anim-speed: ${speed}s; }
  .g-img { max-width: 100%; max-height: 100%; object-fit: contain; cursor: pointer; transition: 0.3s ease; }
  
  /* Константы анимации */
  .anim-float { animation: float var(--anim-speed) ease-in-out infinite; }
  .anim-pulse { animation: pulse calc(var(--anim-speed) / 1.5) infinite; }
  .anim-breathe { animation: breathe var(--anim-speed) ease-in-out infinite; }
  .anim-wobble { animation: wobble var(--anim-speed) ease-in-out infinite; }
  .anim-glitch { animation: glitch calc(var(--anim-speed) / 6) linear infinite; }
  .anim-spin { animation: spin var(--anim-speed) linear infinite; }
  .anim-neon { animation: neon calc(var(--anim-speed) / 1.5) alternate infinite; }
  .anim-swing { animation: swing var(--anim-speed) ease-in-out infinite; transform-origin: top center; }
  .anim-shake { animation: shake calc(var(--anim-speed) / 4) infinite; }
  .anim-ghost { animation: ghost var(--anim-speed) infinite alternate; }

  /* Ховеры */
  .hover-zoom:hover { transform: scale(1.15); }
  .hover-blur:hover { filter: blur(5px); }
  .hover-tilt:hover { transform: rotate(15deg) scale(1.05); }
  .hover-squeeze:hover { transform: scaleY(0.8) scaleX(1.2); }
  .hover-neon:hover { animation: neon calc(var(--anim-speed) / 2) alternate infinite; }
  .hover-shake:hover { animation: shake 0.3s infinite; }

  /* Ключевые кадры */
  @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }
  @keyframes pulse { 0%, 100% { transform: scale(1); filter: brightness(100%);} 50% { transform: scale(1.08); filter: brightness(130%); } }
  @keyframes breathe { 0%, 100% { transform: scaleY(1) scaleX(1); } 50% { transform: scaleY(1.05) scaleX(0.98); } }
  @keyframes wobble { 0%, 100% { transform: rotate(0deg); } 25% { transform: rotate(-5deg); } 75% { transform: rotate(5deg); } }
  @keyframes glitch { 0% { transform: translate(0) } 20% { transform: translate(-3px, 3px) } 40% { transform: translate(-3px, -3px) } 60% { transform: translate(3px, 3px) } 80% { transform: translate(3px, -3px) } 100% { transform: translate(0) } }
  @keyframes bounce { 0% { transform: translateY(0); } 40% { transform: translateY(-60px) scaleY(1.1); } 100% { transform: translateY(0) scaleY(1); } }
  @keyframes spin { 100% { transform: rotate(360deg); } }
  @keyframes neon { 0% { filter: brightness(100%) drop-shadow(0 0 5px ${glowC || '#dfb23e'}); } 100% { filter: brightness(150%) drop-shadow(0 0 20px ${glowC || '#dfb23e'}); } }
  @keyframes swing { 20% { transform: rotate(15deg); } 40% { transform: rotate(-10deg); } 60% { transform: rotate(5deg); } 80% { transform: rotate(-5deg); } 100% { transform: rotate(0deg); } }
  @keyframes shake { 0%, 100% {transform: translateX(0);} 25% {transform: translateX(-5px);} 75% {transform: translateX(5px);} }
  @keyframes ghost { 0% { opacity: 1; filter: grayscale(0%);} 100% { opacity: 0.3; filter: grayscale(80%) blur(2px);} }
  @keyframes squish { 0%, 100% { transform: scale(1); } 50% { transform: scaleY(0.4) scaleX(1.5) translateY(30%); } }
  @keyframes vanish { 0% { opacity: 1; transform: scale(1); } 100% { opacity: 0; transform: scale(2); } }
  @keyframes flip { 0% { transform: perspective(400px) rotateY(0deg); } 100% { transform: perspective(400px) rotateY(360deg); } }
</style>

<div class="g-wrap ${cont !== 'none' ? cont : ''}">
  <img src="${base64Image}" class="g-img ${hov !== 'none' ? hov : ''}" ${clickScript}>
</div>
`;
        
        // Копируем в буфер обмена
        navigator.clipboard.writeText(geniallyCode).then(() => {
            const oldText = geniallyBtn.textContent;
            geniallyBtn.textContent = '✅ Код скопирован! Вставьте в Genially';
            geniallyBtn.style.backgroundColor = 'var(--gold)';
            geniallyBtn.style.color = '#000';
            setTimeout(() => {
                geniallyBtn.textContent = oldText;
                geniallyBtn.style.backgroundColor = 'transparent';
                geniallyBtn.style.color = 'var(--gold)';
            }, 3000);
        }).catch(err => {
            alert('Ошибка копирования. Ваш браузер блокирует буфер обмена.');
        });
    });
</script>

</body>
</html>
