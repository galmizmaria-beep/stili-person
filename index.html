<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Продвинутый редактор персонажа (PRO)</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@700&family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #121110;
            --bg-panel: #1e1d1a;
            --gold: #dfb23e;
            --gold-hover: #f1c75c;
            --text-light: #e0e0e0;
            --font-heading: 'Cormorant Garamond', serif;
            --font-main: 'Montserrat', sans-serif;
            --anim-speed: 2s;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-light);
            font-family: var(--font-main);
            margin: 0; padding: 0;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; overflow: hidden;
            background-image: radial-gradient(circle at 50% 0%, #302a1c 0%, var(--bg-dark) 70%);
        }

        .editor-container {
            background-color: var(--bg-panel);
            padding: 25px; border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.9), 0 0 20px rgba(223, 178, 62, 0.15);
            width: 98%; max-width: 1400px; height: 95vh;
            display: flex; gap: 20px; box-sizing: border-box;
        }

        /* ЛЕВАЯ ПАНЕЛЬ */
        .left-panel {
            flex: 1.2; display: flex; flex-direction: column;
            overflow-y: auto; padding-right: 15px; gap: 15px;
        }
        .left-panel::-webkit-scrollbar { width: 6px; }
        .left-panel::-webkit-scrollbar-track { background: #1a1a1a; border-radius: 10px; }
        .left-panel::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 10px; }

        /* ПРАВАЯ ПАНЕЛЬ */
        .right-panel {
            flex: 1; display: flex; flex-direction: column; position: relative;
        }

        h1 { font-family: var(--font-heading); color: var(--gold); font-size: 1.8em; margin: 0 0 5px 0; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }
        p.subtitle { font-size: 0.8em; color: #a0a0a0; margin: 0 0 15px 0; }

        fieldset {
            border: 1px solid #444; border-radius: 8px; padding: 12px; margin-bottom: 8px; background: rgba(0,0,0,0.2);
        }
        legend { color: var(--gold); font-weight: 600; font-size: 0.9em; padding: 0 10px; }
        .controls { display: flex; flex-direction: column; gap: 10px; }

        /* Табы загрузки */
        .upload-tabs { display: flex; gap: 10px; margin-bottom: 10px; }
        .tab-btn { flex: 1; background: #2a2a2a; color: #888; border: 1px solid #444; padding: 8px; border-radius: 5px; cursor: pointer; font-size: 0.8em; transition: 0.3s; }
        .tab-btn.active { background: var(--gold); color: #000; border-color: var(--gold); font-weight: bold; }
        
        .upload-section { display: none; }
        .upload-section.active { display: block; }
        
        input[type="file"] { display: none; }
        .custom-file-upload { border: 2px dashed var(--gold); padding: 10px; border-radius: 8px; cursor: pointer; transition: 0.3s; color: var(--gold); font-weight: 600; text-align: center; display: block; font-size: 0.9em; }
        .custom-file-upload:hover { background-color: rgba(223, 178, 62, 0.1); }
        
        .text-input { width: 100%; padding: 10px; background-color: #111; color: #fff; border: 1px solid #555; border-radius: 8px; font-family: var(--font-main); font-size: 0.85em; outline: none; box-sizing: border-box; }
        .text-input:focus { border-color: var(--gold); }

        select { width: 100%; padding: 8px; background-color: #111; color: var(--text-light); border: 1px solid #555; border-radius: 8px; font-family: var(--font-main); font-size: 0.85em; outline: none; cursor: pointer; }
        .slider-group { display: flex; flex-direction: column; gap: 4px; }
        .slider-group label { font-size: 0.8em; color: #ccc; display: flex; justify-content: space-between; }
        input[type=range] { -webkit-appearance: none; width: 100%; background: transparent; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 14px; width: 14px; border-radius: 50%; background: var(--gold); cursor: pointer; margin-top: -5px; }
        input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 4px; background: #555; border-radius: 2px; }

        .color-group { display: flex; align-items: center; justify-content: space-between; font-size: 0.85em; color: #ccc;}
        input[type="color"] { border: none; width: 35px; height: 25px; border-radius: 5px; cursor: pointer; background: none; }
        input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
        input[type="color"]::-webkit-color-swatch { border: 1px solid #666; border-radius: 5px; }
        .checkbox-group { display: flex; align-items: center; gap: 8px; font-size: 0.85em; cursor: pointer; color: #ccc;}

        .buttons-group { display: flex; gap: 10px; margin-top: auto; padding-top: 10px;}
        .buttons-group button { flex: 1; padding: 12px; border-radius: 8px; font-family: var(--font-main); font-weight: 600; cursor: pointer; transition: 0.3s; border: none; }
        #processBtn { background-color: var(--gold); color: #000; }
        #processBtn:hover { background-color: var(--gold-hover); transform: translateY(-2px); }
        #processBtn:disabled { background-color: #444; color: #777; cursor: not-allowed; transform: none; }
        #resetBtn { background-color: transparent; border: 1px solid #666; color: #ccc; flex: 0.4; }
        #resetBtn:hover { background-color: #333; color: #fff; }

        /* ПРЕВЬЮ */
        .preview-box {
            flex: 1; border-radius: 10px; display: flex; justify-content: center; align-items: center;
            overflow: hidden; position: relative; border: 1px solid #333; transition: background 0.3s;
            background-color: #000;
            background-image: linear-gradient(45deg, #111 25%, transparent 25%), linear-gradient(-45deg, #111 25%, transparent 25%), linear-gradient(45deg, transparent 75%, #111 75%), linear-gradient(-45deg, transparent 75%, #111 75%);
            background-size: 20px 20px; background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
        }

        #canvasWrapper { position: relative; display: flex; justify-content: center; align-items: center; width: 100%; height: 100%; transition: all 0.3s ease; }
        canvas { max-width: 90%; max-height: 80%; object-fit: contain; transition: all 0.3s ease; cursor: pointer; position: relative; z-index: 5;}
        .placeholder-text { position: absolute; color: #666; background: rgba(0,0,0,0.8); padding: 10px 20px; border-radius: 10px; font-size: 0.9em; z-index: 10;}

        /* ДОП ЭФФЕКТЫ ПРЕВЬЮ */
        .preview-shadow { position: absolute; bottom: 5%; width: 50%; height: 20px; background: radial-gradient(ellipse at center, rgba(0,0,0,0.8) 0%, rgba(0,0,0,0) 70%); border-radius: 50%; display: none; z-index: 1;}
        .preview-tooltip { position: absolute; top: 10%; background: rgba(0,0,0,0.8); border: 1px solid var(--gold); color: var(--gold); padding: 5px 15px; border-radius: 5px; font-size: 0.9em; font-weight: bold; pointer-events: none; opacity: 0; transition: 0.3s; z-index: 10; transform: translateY(10px);}
        canvas:hover ~ .preview-tooltip.active { opacity: 1; transform: translateY(0); }
        
        /* ЧАСТИЦЫ */
        .particles-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 2; overflow: hidden; display: none;}
        .particle { position: absolute; border-radius: 50%; animation: floatUp linear infinite; opacity: 0; }
        @keyframes floatUp { 0% { transform: translateY(100vh) scale(0); opacity: 0; } 20% { opacity: 1; } 80% { opacity: 1; } 100% { transform: translateY(-100px) scale(1.5); opacity: 0; } }

        /* АНИМАЦИИ */
        .anim-float { animation: float var(--anim-speed) ease-in-out infinite; }
        .anim-pulse { animation: pulse calc(var(--anim-speed) / 1.5) infinite; }
        .anim-breathe { animation: breathe var(--anim-speed) ease-in-out infinite; }
        .anim-wobble { animation: wobble var(--anim-speed) ease-in-out infinite; }
        .anim-glitch { animation: glitch calc(var(--anim-speed) / 6) linear infinite; }
        .anim-spin { animation: spin var(--anim-speed) linear infinite; }
        .anim-neon { animation: neon calc(var(--anim-speed) / 1.5) alternate infinite; }
        .anim-swing { animation: swing var(--anim-speed) ease-in-out infinite; transform-origin: top center; }
        .anim-shake { animation: shake calc(var(--anim-speed) / 4) infinite; }
        .anim-ghost { animation: ghost var(--anim-speed) infinite alternate; }

        .hover-zoom:hover { transform: scale(1.15) !important; }
        .hover-blur:hover { filter: blur(5px); }
        .hover-tilt:hover { transform: rotate(15deg) scale(1.05) !important; }
        .hover-squeeze:hover { transform: scaleY(0.8) scaleX(1.2) !important; }
        .hover-neon:hover { animation: neon calc(var(--anim-speed) / 2) alternate infinite; }
        .hover-shake:hover { animation: shake 0.3s infinite; }

        .click-bounce-trigger { animation: bounce 0.5s ease forwards !important; }
        .click-spin-trigger { animation: spin 0.6s cubic-bezier(0.4, 0, 0.2, 1) forwards !important; }
        .click-squish-trigger { animation: squish 0.3s forwards !important; }
        .click-vanish-trigger { animation: vanish 0.5s forwards !important; }
        .click-flip-trigger { animation: flip 0.6s forwards !important; }
        .click-glitch-trigger { animation: glitch 0.3s linear infinite !important; }

        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.08); filter: brightness(130%); } 100% { transform: scale(1); } }
        @keyframes breathe { 0%, 100% { transform: scaleY(1) scaleX(1); } 50% { transform: scaleY(1.05) scaleX(0.98); } }
        @keyframes wobble { 0%, 100% { transform: rotate(0deg); } 25% { transform: rotate(-5deg); } 75% { transform: rotate(5deg); } }
        @keyframes glitch { 0% { transform: translate(0) } 20% { transform: translate(-3px, 3px) } 40% { transform: translate(-3px, -3px) } 60% { transform: translate(3px, 3px) } 80% { transform: translate(3px, -3px) } 100% { transform: translate(0) } }
        @keyframes bounce { 0% { transform: translateY(0); } 40% { transform: translateY(-60px) scaleY(1.1); } 100% { transform: translateY(0) scaleY(1); } }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        @keyframes neon { 0% { filter: brightness(100%) drop-shadow(0 0 5px var(--gold)); } 100% { filter: brightness(150%) drop-shadow(0 0 20px var(--gold)); } }
        @keyframes swing { 20% { transform: rotate(15deg); } 40% { transform: rotate(-10deg); } 60% { transform: rotate(5deg); } 80% { transform: rotate(-5deg); } 100% { transform: rotate(0deg); } }
        @keyframes shake { 0%, 100% {transform: translateX(0);} 25% {transform: translateX(-5px);} 75% {transform: translateX(5px);} }
        @keyframes ghost { 0% { opacity: 1; filter: grayscale(0%);} 100% { opacity: 0.3; filter: grayscale(80%) blur(2px);} }
        @keyframes squish { 0%, 100% { transform: scale(1); } 50% { transform: scaleY(0.4) scaleX(1.5) translateY(30%); } }
        @keyframes vanish { 0% { opacity: 1; transform: scale(1); } 100% { opacity: 0; transform: scale(2); } }
        @keyframes flip { 0% { transform: perspective(400px) rotateY(0deg); } 100% { transform: perspective(400px) rotateY(360deg); } }
    </style>
</head>
<body>

<div class="editor-container">
    <div class="left-panel">
        <div>
            <h1>Редактор персонажа PRO</h1>
            <p class="subtitle">Настрой визуал, эффекты и интерактивы для игры</p>

            <!-- БЛОК: ЗАГРУЗКА -->
            <div class="upload-tabs">
                <button class="tab-btn active" onclick="switchTab('file')">📁 Файл с ПК</button>
                <button class="tab-btn" onclick="switchTab('url')">🔗 Ссылка (URL)</button>
            </div>
            
            <div id="tab-file" class="upload-section active">
                <label class="custom-file-upload">
                    <input type="file" id="imageUpload" accept="image/png, image/jpeg, image/webp">
                    <span id="fileName">Нажми, чтобы загрузить картинку без фона</span>
                </label>
            </div>
            <div id="tab-url" class="upload-section">
                <input type="text" id="imageUrl" class="text-input" placeholder="Вставь прямую ссылку на картинку (https://...)" style="margin-bottom:15px;">
            </div>

            <!-- БЛОК: ВНЕШНИЙ ВИД -->
            <fieldset>
                <legend>Внешний вид и Статусы</legend>
                <div class="controls">
                    <select id="styleSelect">
                        <option value="none">Оригинал (Без стиля)</option>
                        <option value="pixel">👾 8-bit Пиксель-арт</option>
                        <option value="sketch">✏️ Карандашный скетч</option>
                        <option value="cyberpunk">🌃 Киберпанк-неон</option>
                        <option value="hologram">💿 Голограмма</option>
                        <option value="silhouette">🥷 Силуэт ниндзя</option>
                        <option value="ghost">👻 Призрак</option>
                    </select>

                    <select id="toningSelect">
                        <option value="none">🎨 Без цветового статуса</option>
                        <option value="poison">🤢 Отравлен (Зеленый)</option>
                        <option value="fire">🔥 В огне (Оранжевый)</option>
                        <option value="freeze">❄️ Заморожен (Синий)</option>
                        <option value="rage">💢 Ярость (Красный)</option>
                        <option value="stone">🪨 Окаменение (Серый)</option>
                    </select>

                    <label class="checkbox-group"><input type="checkbox" id="flipCheck"> 🔄 Отразить по горизонтали</label>

                    <div class="slider-group">
                        <label>Прозрачность <span id="opacityVal">100%</span></label>
                        <input type="range" id="opacitySlider" min="10" max="100" value="100">
                    </div>
                    <div class="slider-group">
                        <label>Яркость <span id="brightVal">100%</span></label>
                        <input type="range" id="brightnessSlider" min="10" max="250" value="100">
                    </div>
                </div>
            </fieldset>

            <!-- БЛОК: ЭФФЕКТЫ -->
            <fieldset>
                <legend>Эффекты и Окружение</legend>
                <div class="controls">
                    <div class="slider-group">
                        <label>Магическое свечение <span id="glowVal">0</span></label>
                        <input type="range" id="glowSlider" min="0" max="80" value="0">
                    </div>
                    
                    <div class="color-group" style="margin-bottom: 5px;">
                        <label class="checkbox-group"><input type="checkbox" id="outlineCheck"> Обводка контура (Stroke)</label>
                        <input type="color" id="outlineColor" value="#ffffff">
                    </div>

                    <div class="color-group">
                        <label>Цвет эффектов (Свечение/Частицы):</label>
                        <input type="color" id="glowColor" value="#dfb23e">
                    </div>

                    <label class="checkbox-group"><input type="checkbox" id="shadowCheck"> 🕳️ Тень на полу (Приземление)</label>

                    <select id="particlesSelect">
                        <option value="none">Без фоновых частиц</option>
                        <option value="sparks">✨ Искры магии</option>
                        <option value="snow">🌨️ Снежинки</option>
                        <option value="bubbles">🫧 Пузырьки</option>
                        <option value="pixels">🔲 Пиксельный мусор</option>
                    </select>
                </div>
            </fieldset>

            <!-- БЛОК: АНИМАЦИИ И ИНТЕРАКТИВ -->
            <fieldset>
                <legend>Анимации и Интерактив (Клик / Наведение)</legend>
                <div class="controls">
                    <div class="slider-group">
                        <label>Скорость анимаций <span id="speedVal">Нормальная</span></label>
                        <input type="range" id="animSpeed" min="0.2" max="4" step="0.1" value="2" dir="rtl">
                    </div>

                    <select id="animContinuous">
                        <option value="none">Покой (Без фоновой анимации)</option>
                        <option value="anim-float">🎈 Парение (Полет)</option>
                        <option value="anim-pulse">💓 Пульс (Сердцебиение)</option>
                        <option value="anim-shake">🫨 Тряска (Землетрясение)</option>
                        <option value="anim-glitch">⚡ Глюк (Системная ошибка)</option>
                        <option value="anim-spin">🌪️ Вращение (Водоворот)</option>
                        <option value="anim-neon">🌟 Неон (Сияние)</option>
                        <option value="anim-wobble">🥴 Шатание (Оглушение)</option>
                        <option value="anim-swing">🕰️ Качание (Маятник)</option>
                        <option value="anim-breathe">🫁 Дыхание (AFK)</option>
                        <option value="anim-ghost">👻 Призрак (Мерцание)</option>
                    </select>

                    <select id="animHover">
                        <option value="none">Без реакции на наведение</option>
                        <option value="hover-zoom">🔍 Увеличение (Zoom)</option>
                        <option value="hover-tilt">🔄 Наклон вперед</option>
                        <option value="hover-squeeze">🥞 Сплющивание</option>
                        <option value="hover-blur">🌫️ Размытие (Скрытность)</option>
                        <option value="hover-neon">✨ Магический отклик (Неон)</option>
                        <option value="hover-shake">💥 Дрожь (Агро)</option>
                    </select>

                    <select id="animClick">
                        <option value="none">Без внутренней анимации по клику</option>
                        <option value="click-bounce">🦘 Прыжок (Уклонение)</option>
                        <option value="click-spin">🔄 Сальто 360 (Перекат)</option>
                        <option value="click-squish">🔨 Удар молотком (Стан)</option>
                        <option value="click-flip">🎭 Переворот (Смена стойки)</option>
                        <option value="click-vanish">💨 Исчезновение (ТП)</option>
                        <option value="click-glitch">💻 Критический сбой</option>
                    </select>

                    <input type="text" id="tooltipInput" class="text-input" placeholder="💬 Всплывающее имя (напр: Гоблин 100HP)">
                    <input type="text" id="audioInput" class="text-input" placeholder="🎵 URL звука при клике (.mp3)">
                </div>
            </fieldset>
        </div>

        <div class="buttons-group">
            <button id="resetBtn">Сброс</button>
            <button id="processBtn" disabled>Сгенерировать код</button>
        </div>
    </div>

    <!-- ПРАВАЯ КОЛОНКА -->
    <div class="right-panel">
        <div class="preview-box" id="previewBox">
            <span class="placeholder-text" id="placeholder">Загрузите или вставьте ссылку</span>
            <div id="canvasWrapper">
                <div class="particles-container" id="particlesPreview"></div>
                <div class="preview-shadow" id="previewShadow"></div>
                <canvas id="canvas"></canvas>
                <div class="preview-tooltip" id="previewTooltip"></div>
            </div>
        </div>
    </div>
</div>

<script>
    // Инициализация элементов
    const els = {
        imageUpload: document.getElementById('imageUpload'),
        imageUrl: document.getElementById('imageUrl'),
        fileName: document.getElementById('fileName'),
        styleSelect: document.getElementById('styleSelect'),
        toningSelect: document.getElementById('toningSelect'),
        flipCheck: document.getElementById('flipCheck'),
        brightnessSlider: document.getElementById('brightnessSlider'),
        opacitySlider: document.getElementById('opacitySlider'),
        glowSlider: document.getElementById('glowSlider'),
        glowColor: document.getElementById('glowColor'),
        outlineCheck: document.getElementById('outlineCheck'),
        outlineColor: document.getElementById('outlineColor'),
        shadowCheck: document.getElementById('shadowCheck'),
        particlesSelect: document.getElementById('particlesSelect'),
        animSpeed: document.getElementById('animSpeed'),
        animContinuous: document.getElementById('animContinuous'),
        animHover: document.getElementById('animHover'),
        animClick: document.getElementById('animClick'),
        tooltipInput: document.getElementById('tooltipInput'),
        audioInput: document.getElementById('audioInput'),
        canvas: document.getElementById('canvas'),
        ctx: document.getElementById('canvas').getContext('2d', { willReadFrequently: true }),
        processBtn: document.getElementById('processBtn'),
        resetBtn: document.getElementById('resetBtn'),
        placeholder: document.getElementById('placeholder'),
        canvasWrapper: document.getElementById('canvasWrapper'),
        previewShadow: document.getElementById('previewShadow'),
        previewTooltip: document.getElementById('previewTooltip'),
        particlesPreview: document.getElementById('particlesPreview'),
        previewBox: document.getElementById('previewBox')
    };

    let originalImage = new Image();
    originalImage.crossOrigin = "Anonymous";
    let isImageLoaded = false;
    let isGenerated = false;
    let inputMode = 'file'; 
    let maxCanvasSize = 600;

    // Вкладки загрузки
    window.switchTab = function(mode) {
        inputMode = mode;
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        document.querySelectorAll('.upload-section').forEach(sec => sec.classList.remove('active'));
        document.querySelector(`.tab-btn[onclick="switchTab('${mode}')"]`).classList.add('active');
        document.getElementById(`tab-${mode}`).classList.add('active');
        
        if(mode === 'url' && els.imageUrl.value) loadImageUrl();
    }

    els.imageUpload.addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (file) {
            els.fileName.textContent = '📁 ' + (file.name.length > 25 ? file.name.substring(0, 22) + '...' : file.name);
            const reader = new FileReader();
            reader.onload = e => processImageSource(e.target.result);
            reader.readAsDataURL(file);
        }
    });

    els.imageUrl.addEventListener('input', debounce(loadImageUrl, 500));
    function loadImageUrl() {
        if(els.imageUrl.value.trim() !== '') processImageSource(els.imageUrl.value.trim());
    }

    function processImageSource(src) {
        originalImage.onload = function() {
            let scale = Math.min(maxCanvasSize / originalImage.width, maxCanvasSize / originalImage.height, 1);
            els.canvas.width = originalImage.width * scale;
            els.canvas.height = originalImage.height * scale;
            isImageLoaded = true;
            els.placeholder.style.display = 'none';
            triggerUpdate();
        }
        originalImage.onerror = () => alert('Ошибка загрузки картинки. Возможно, сервер блокирует CORS.');
        originalImage.src = src;
    }

    function debounce(func, wait) {
        let timeout;
        return function(...args) {
            clearTimeout(timeout);
            timeout = setTimeout(() => func.apply(this, args), wait);
        };
    }

    const triggerUpdate = () => {
        if (!isImageLoaded) return;
        document.getElementById('brightVal').textContent = els.brightnessSlider.value + '%';
        document.getElementById('opacityVal').textContent = els.opacitySlider.value + '%';
        document.getElementById('glowVal').textContent = els.glowSlider.value;
        
        let s = els.animSpeed.value;
        document.getElementById('speedVal').textContent = s < 1 ? "Медленно" : (s > 2.5 ? "Быстро" : "Нормальная");
        document.documentElement.style.setProperty('--anim-speed', `${s}s`);
        
        applyStyle();
        updatePreviewEffects();
        resetProcessButton();
    };

    const inputsToWatch = ['styleSelect', 'toningSelect', 'flipCheck', 'outlineCheck', 'shadowCheck', 'particlesSelect'];
    inputsToWatch.forEach(id => els[id].addEventListener('change', triggerUpdate));
    
    const slidersToWatch = ['brightnessSlider', 'opacitySlider', 'glowSlider'];
    slidersToWatch.forEach(id => els[id].addEventListener('input', debounce(triggerUpdate, 50)));

    els.outlineColor.addEventListener('input', debounce(triggerUpdate, 100));
    els.glowColor.addEventListener('input', debounce(triggerUpdate, 100));
    els.animSpeed.addEventListener('input', triggerUpdate);

    const updatePreviewEffects = () => {
        els.canvasWrapper.className = '';
        els.canvas.className = '';
        if (els.animContinuous.value !== 'none') els.canvasWrapper.classList.add(els.animContinuous.value);
        if (els.animHover.value !== 'none') els.canvas.classList.add(els.animHover.value);

        els.previewShadow.style.display = els.shadowCheck.checked ? 'block' : 'none';

        if(els.tooltipInput.value.trim() !== '') {
            els.previewTooltip.textContent = els.tooltipInput.value;
            els.previewTooltip.classList.add('active');
        } else {
            els.previewTooltip.classList.remove('active');
        }

        let ol = els.outlineCheck.checked;
        let c = els.outlineColor.value;
        let glowV = els.glowSlider.value;
        let glowC = els.glowColor.value;
        
        let dropShadowCSS = '';
        if(ol) dropShadowCSS += `drop-shadow(2px 0 0 ${c}) drop-shadow(-2px 0 0 ${c}) drop-shadow(0 2px 0 ${c}) drop-shadow(0 -2px 0 ${c}) `;
        if(glowV > 0) dropShadowCSS += `drop-shadow(0 0 ${glowV}px ${glowC}) `;
        
        els.canvas.style.filter = dropShadowCSS.trim();
        generateParticlesPreview();
    };

    [els.animContinuous, els.animHover, els.animClick, els.tooltipInput].forEach(el => el.addEventListener('input', updatePreviewEffects));

    function generateParticlesPreview() {
        els.particlesPreview.innerHTML = '';
        let type = els.particlesSelect.value;
        if(type === 'none') { els.particlesPreview.style.display = 'none'; return; }
        els.particlesPreview.style.display = 'block';

        let color = els.glowColor.value;
        for(let i=0; i<15; i++) {
            let p = document.createElement('div');
            p.className = 'particle';
            p.style.left = Math.random() * 100 + '%';
            p.style.width = p.style.height = (Math.random() * 6 + 4) + 'px';
            p.style.background = (type === 'snow') ? '#fff' : color;
            if(type === 'pixels') p.style.borderRadius = '0';
            p.style.animationDuration = (Math.random() * 2 + 2) + 's';
            p.style.animationDelay = (Math.random() * 2) + 's';
            els.particlesPreview.appendChild(p);
        }
    }

    els.canvas.addEventListener('click', () => {
        if(els.audioInput.value.trim() !== '') {
            new Audio(els.audioInput.value).play().catch(e=>console.log('Audio error:', e));
        }
        if(els.animClick.value === 'none') return;
        let clickClass = els.animClick.value + '-trigger';
        els.canvas.classList.remove(clickClass);
        void els.canvas.offsetWidth;
        els.canvas.classList.add(clickClass);
        setTimeout(() => els.canvas.classList.remove(clickClass), 1000);
    });

    function resetProcessButton() {
        els.processBtn.textContent = 'Сгенерировать код';
        els.processBtn.disabled = !isImageLoaded;
        els.processBtn.style.backgroundColor = 'var(--gold)';
        els.processBtn.style.color = '#000';
        isGenerated = false;
    }

    els.resetBtn.addEventListener('click', () => {
        document.querySelectorAll('select').forEach(s => s.value = s.options[0].value);
        document.querySelectorAll('input[type=checkbox]').forEach(c => c.checked = false);
        els.brightnessSlider.value = 100;
        els.opacitySlider.value = 100;
        els.glowSlider.value = 0;
        els.tooltipInput.value = '';
        els.audioInput.value = '';
        triggerUpdate();
    });

    function applyStyle() {
        if (!isImageLoaded) return;

        const style = els.styleSelect.value;
        const toning = els.toningSelect.value;
        const brightness = els.brightnessSlider.value;
        const opacity = els.opacitySlider.value / 100;
        const isFlipped = els.flipCheck.checked;

        const tempCanvas = document.createElement('canvas');
        tempCanvas.width = els.canvas.width; tempCanvas.height = els.canvas.height;
        const tempCtx = tempCanvas.getContext('2d');

        if (isFlipped) { tempCtx.translate(els.canvas.width, 0); tempCtx.scale(-1, 1); }

        let filterStr = `brightness(${brightness}%) `;
        
        if (style === 'sketch') filterStr += `grayscale(100%) contrast(200%) `;
        if (style === 'cyberpunk') filterStr += `saturate(300%) hue-rotate(90deg) contrast(150%) invert(10%) `;
        if (style === 'ghost') filterStr += `invert(80%) grayscale(50%) hue-rotate(180deg) blur(1px) `;
        if (style === 'hologram') filterStr += `sepia(100%) hue-rotate(180deg) saturate(300%) contrast(150%) `;
        
        if (toning === 'poison') filterStr += `sepia(100%) hue-rotate(60deg) saturate(300%) `;
        if (toning === 'fire') filterStr += `sepia(100%) hue-rotate(-30deg) saturate(400%) `;
        if (toning === 'freeze') filterStr += `sepia(100%) hue-rotate(180deg) saturate(200%) brightness(120%) `;
        if (toning === 'rage') filterStr += `sepia(100%) hue-rotate(-50deg) saturate(500%) contrast(150%) `;
        if (toning === 'stone') filterStr += `grayscale(100%) contrast(80%) brightness(90%) `;

        tempCtx.filter = filterStr.trim() || 'none';
        tempCtx.globalAlpha = opacity;
        tempCtx.drawImage(originalImage, 0, 0, els.canvas.width, els.canvas.height);
        tempCtx.globalAlpha = 1.0; 
        tempCtx.filter = 'none';

        if (style === 'pixel') {
            let pSize = 2; 
            const w = Math.ceil(els.canvas.width / pSize), h = Math.ceil(els.canvas.height / pSize);
            const tinyC = document.createElement('canvas');
            tinyC.width = w; tinyC.height = h;
            tinyC.getContext('2d').drawImage(tempCanvas, 0, 0, w, h);
            tempCtx.clearRect(0, 0, els.canvas.width, els.canvas.height);
            tempCtx.imageSmoothingEnabled = false;
            tempCtx.drawImage(tinyC, 0, 0, w, h, 0, 0, els.canvas.width, els.canvas.height);
        } 
        else if (style === 'silhouette') {
            tempCtx.globalCompositeOperation = 'source-in';
            tempCtx.fillStyle = '#050505';
            tempCtx.fillRect(0, 0, els.canvas.width, els.canvas.height);
            tempCtx.globalCompositeOperation = 'source-over';
        }

        els.ctx.clearRect(0, 0, els.canvas.width, els.canvas.height);
        els.ctx.setTransform(1, 0, 0, 1, 0, 0); 
        els.ctx.drawImage(tempCanvas, 0, 0, els.canvas.width, els.canvas.height);
    }

    // ГЕНЕРАЦИЯ КОДА ДЛЯ GENIALLY
    els.processBtn.addEventListener('click', function() {
        if (!isImageLoaded) return;
        
        if (!isGenerated) {
            els.processBtn.textContent = 'Компиляция магии... ⚡';
            els.processBtn.disabled = true;
            setTimeout(() => {
                els.processBtn.textContent = 'Скопировать код';
                els.processBtn.disabled = false;
                isGenerated = true;
            }, 500);
        } else {
            let finalImageSrc = '';
            let requiresCanvasEncode = els.styleSelect.value === 'pixel' || els.styleSelect.value === 'silhouette' || els.flipCheck.checked || els.toningSelect.value !== 'none';
            
            if (inputMode === 'url' && !requiresCanvasEncode) {
                finalImageSrc = els.imageUrl.value;
            } else {
                finalImageSrc = els.canvas.toDataURL('image/webp', 0.8);
            }

            const cont = els.animContinuous.value;
            const hov = els.animHover.value;
            const clk = els.animClick.value;
            const speed = els.animSpeed.value;
            const tooltip = els.tooltipInput.value.replace(/"/g, '&quot;');
            const audioStr = els.audioInput.value;
            
            let imgCssFilter = '';
            if(inputMode === 'url' && !requiresCanvasEncode) {
               imgCssFilter = `brightness(${els.brightnessSlider.value}%) opacity(${els.opacitySlider.value}%) `;
            }

            let ol = els.outlineCheck.checked;
            let c = els.outlineColor.value;
            let glowV = els.glowSlider.value;
            let glowC = els.glowColor.value;
            if(ol) imgCssFilter += `drop-shadow(2px 0 0 ${c}) drop-shadow(-2px 0 0 ${c}) drop-shadow(0 2px 0 ${c}) drop-shadow(0 -2px 0 ${c}) `;
            if(glowV > 0) imgCssFilter += `drop-shadow(0 0 ${glowV}px ${glowC}) `;

            let scriptBlock = "";
            let clickLogic = "e.stopPropagation(); "; // ЗАПРЕТИТЬ ПЕРЕХОД ДЛЯ GENIALLY
            
            if(clk !== 'none') {
                let animName = clk.replace('click-', '');
                let t = "0.5s ease forwards";
                if(animName === 'spin') t = "0.6s cubic-bezier(0.4, 0, 0.2, 1) forwards";
                if(animName === 'squish') t = "0.3s forwards";
                if(animName === 'vanish') t = "0.5s forwards";
                if(animName === 'flip') t = "0.6s forwards";
                if(animName === 'glitch') t = "0.3s linear infinite";
                clickLogic += `this.style.animation = 'none'; void this.offsetWidth; this.style.animation = '${animName} ${t}'; setTimeout(() => { this.style.animation = ''; }, 1000); `;
            }
            
            if(audioStr !== '') clickLogic += `new Audio('${audioStr}').play();`;

            // Скрипт теперь всегда добавляется, чтобы предотвратить переход на следующий слайд при клике
            scriptBlock = `\n<script>document.getElementById('g-img').addEventListener('click', function(e) { ${clickLogic} });<\/script>`;

            let shadowHTML = els.shadowCheck.checked ? '<div class="g-shadow"></div>' : '';
            
            let particlesHTML = '';
            let pType = els.particlesSelect.value;
            if(pType !== 'none') {
                particlesHTML += '<div class="p-wrap">';
                for(let i=0; i<15; i++) {
                    let rad = (pType === 'pixels') ? '0' : '50%';
                    let bg = (pType === 'snow') ? '#fff' : glowC;
                    let size = (Math.random() * 6 + 4) + 'px';
                    let left = Math.random() * 100 + '%';
                    let dur = (Math.random() * 2 + 2) + 's';
                    let del = (Math.random() * 2) + 's';
                    particlesHTML += `<div style="position:absolute; bottom:-20px; left:${left}; width:${size}; height:${size}; background:${bg}; border-radius:${rad}; animation: p-anim ${dur} linear infinite ${del}; opacity:0;"></div>`;
                }
                particlesHTML += '</div>';
            }

            let tooltipHTML = tooltip ? `<div class="g-tt">${tooltip}</div>` : '';

            // ФИНАЛЬНЫЙ HTML КОД (добавлен pointer-events: none на фон и pointer-events: auto на саму картинку)
            const geniallyCode = `<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<style>
  html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: transparent; font-family: sans-serif; pointer-events: none;}
  .g-cont { display: flex; justify-content: center; align-items: center; width: 100%; height: 100%; position: relative; --anim-speed: ${speed}s; pointer-events: none;}
  .g-wrap { position: relative; display: inline-flex; justify-content: center; align-items: center; width: 100%; height: 100%; pointer-events: none;}
  
  #g-img { width: 100%; height: 100%; object-fit: contain; cursor: pointer; transition: 0.3s ease; display: block; position: relative; z-index: 5; filter: ${imgCssFilter || 'none'}; pointer-events: auto;}
  
  .g-shadow { position: absolute; bottom: 5%; width: 50%; height: 20px; background: radial-gradient(ellipse at center, rgba(0,0,0,0.6) 0%, transparent 70%); border-radius: 50%; z-index: 1; pointer-events: none; }
  
  .g-tt { position: absolute; top: 10%; background: rgba(0,0,0,0.8); border: 1px solid ${glowC}; color: ${glowC}; padding: 5px 15px; border-radius: 5px; font-size: 14px; font-weight: bold; opacity: 0; transition: 0.3s; z-index: 10; pointer-events: none; transform: translateY(10px); text-align: center;}
  #g-img:hover ~ .g-tt { opacity: 1; transform: translateY(0); }
  
  .p-wrap { position: absolute; width: 100%; height: 100%; top:0; left:0; z-index: 2; pointer-events: none; overflow: hidden; }
  @keyframes p-anim { 0% { transform: translateY(100vh) scale(0); opacity: 0; } 20% { opacity: 1; } 80% { opacity: 1; } 100% { transform: translateY(-50px) scale(1.5); opacity: 0; } }

  /* --- ВСЕ КЛАССЫ АНИМАЦИЙ --- */
  .anim-float { animation: float var(--anim-speed) ease-in-out infinite; }
  .anim-pulse { animation: pulse calc(var(--anim-speed) / 1.5) infinite; }
  .anim-breathe { animation: breathe var(--anim-speed) ease-in-out infinite; }
  .anim-wobble { animation: wobble var(--anim-speed) ease-in-out infinite; }
  .anim-glitch { animation: glitch calc(var(--anim-speed) / 6) linear infinite; }
  .anim-spin { animation: spin var(--anim-speed) linear infinite; }
  .anim-neon { animation: neon calc(var(--anim-speed) / 1.5) alternate infinite; }
  .anim-swing { animation: swing var(--anim-speed) ease-in-out infinite; transform-origin: top center; }
  .anim-shake { animation: shake calc(var(--anim-speed) / 4) infinite; }
  .anim-ghost { animation: ghost var(--anim-speed) infinite alternate; }
  
  .hover-zoom:hover { transform: scale(1.15); }
  .hover-blur:hover { filter: blur(5px); }
  .hover-tilt:hover { transform: rotate(15deg) scale(1.05); }
  .hover-squeeze:hover { transform: scaleY(0.8) scaleX(1.2); }
  .hover-neon:hover { animation: neon calc(var(--anim-speed) / 2) alternate infinite; }
  .hover-shake:hover { animation: shake 0.3s infinite; }

  /* --- ВСЕ КЛЮЧЕВЫЕ КАДРЫ --- */
  @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }
  @keyframes pulse { 0%, 100% { transform: scale(1); filter: brightness(100%);} 50% { transform: scale(1.08); filter: brightness(130%); } }
  @keyframes breathe { 0%, 100% { transform: scaleY(1) scaleX(1); } 50% { transform: scaleY(1.05) scaleX(0.98); } }
  @keyframes wobble { 0%, 100% { transform: rotate(0deg); } 25% { transform: rotate(-5deg); } 75% { transform: rotate(5deg); } }
  @keyframes bounce { 0% { transform: translateY(0); } 40% { transform: translateY(-60px) scaleY(1.1); } 100% { transform: translateY(0) scaleY(1); } }
  @keyframes spin { 100% { transform: rotate(360deg); } }
  @keyframes neon { 0% { filter: brightness(100%) drop-shadow(0 0 5px ${glowC}); } 100% { filter: brightness(150%) drop-shadow(0 0 20px ${glowC}); } }
  @keyframes shake { 0%, 100% {transform: translateX(0);} 25% {transform: translateX(-5px);} 75% {transform: translateX(5px);} }
  @keyframes squish { 0%, 100% { transform: scale(1); } 50% { transform: scaleY(0.4) scaleX(1.5) translateY(30%); } }
  @keyframes vanish { 0% { opacity: 1; transform: scale(1); } 100% { opacity: 0; transform: scale(2); } }
  @keyframes flip { 0% { transform: perspective(400px) rotateY(0deg); } 100% { transform: perspective(400px) rotateY(360deg); } }
  @keyframes glitch { 0% { transform: translate(0) } 20% { transform: translate(-3px, 3px) } 40% { transform: translate(-3px, -3px) } 60% { transform: translate(3px, 3px) } 80% { transform: translate(3px, -3px) } 100% { transform: translate(0) } }
  @keyframes swing { 20% { transform: rotate(15deg); } 40% { transform: rotate(-10deg); } 60% { transform: rotate(5deg); } 80% { transform: rotate(-5deg); } 100% { transform: rotate(0deg); } }
  @keyframes ghost { 0% { opacity: 1; filter: grayscale(0%);} 100% { opacity: 0.3; filter: grayscale(80%) blur(2px);} }
</style>
</head>
<body>
<div class="g-cont">
  <div class="g-wrap ${cont !== 'none' ? cont : ''}">
    ${particlesHTML}
    ${shadowHTML}
    <img id="g-img" src="${finalImageSrc}" class="${hov !== 'none' ? hov : ''}">
    ${tooltipHTML}
  </div>
</div>
${scriptBlock}
</body>
</html>`;
            
            navigator.clipboard.writeText(geniallyCode).then(() => {
                els.processBtn.textContent = '✅ Код скопирован!';
                els.processBtn.style.backgroundColor = '#4CAF50';
                els.processBtn.style.color = '#fff';
                setTimeout(() => {
                    els.processBtn.textContent = 'Скопировать код';
                    els.processBtn.style.backgroundColor = 'var(--gold)';
                    els.processBtn.style.color = '#000';
                }, 3000);
            }).catch(() => alert('Ошибка. Браузер блокирует буфер обмена.'));
        }
    });
</script>

</body>
</html>
