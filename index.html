<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Измени персонажа</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@700&family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #161513;
            --bg-panel: #23221f;
            --gold: #dfb23e;
            --gold-hover: #f1c75c;
            --text-light: #e0e0e0;
            --font-heading: 'Cormorant Garamond', serif;
            --font-main: 'Montserrat', sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-light);
            font-family: var(--font-main);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-image: radial-gradient(circle at 50% 0%, #302a1c 0%, var(--bg-dark) 60%);
        }

        .editor-container {
            background-color: var(--bg-panel);
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8), 0 0 15px rgba(223, 178, 62, 0.1);
            max-width: 600px;
            width: 100%;
            text-align: center;
        }

        h1 {
            font-family: var(--font-heading);
            color: var(--gold);
            font-size: 3em;
            margin-top: 0;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            letter-spacing: 2px;
        }

        p.subtitle {
            font-size: 0.9em;
            color: #a0a0a0;
            margin-bottom: 30px;
        }

        .controls {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 20px;
        }

        input[type="file"] {
            display: none;
        }

        .custom-file-upload {
            border: 2px dashed var(--gold);
            padding: 20px;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.3s;
            color: var(--gold);
            font-weight: 600;
        }

        .custom-file-upload:hover {
            background-color: rgba(223, 178, 62, 0.1);
        }

        select, .settings-panel {
            width: 100%;
            padding: 15px;
            background-color: var(--bg-dark);
            color: var(--text-light);
            border: 1px solid #444;
            border-radius: 15px;
            font-family: var(--font-main);
            font-size: 1em;
            outline: none;
            box-sizing: border-box;
        }

        select {
            border-radius: 25px;
            cursor: pointer;
            appearance: none;
            text-align: center;
        }

        .settings-panel {
            display: flex;
            flex-direction: column;
            gap: 15px;
            text-align: left;
        }

        .slider-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .slider-group label {
            font-size: 0.85em;
            color: var(--gold);
            display: flex;
            justify-content: space-between;
        }

        /* Стилизация ползунков */
        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 16px;
            width: 16px;
            border-radius: 50%;
            background: var(--gold);
            cursor: pointer;
            margin-top: -6px;
        }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 4px;
            cursor: pointer;
            background: #444;
            border-radius: 2px;
        }

        /* Стилизация палитры */
        .color-picker-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        input[type="color"] {
            -webkit-appearance: none;
            border: none;
            width: 30px;
            height: 30px;
            border-radius: 5px;
            cursor: pointer;
            background: none;
        }
        input[type="color"]::-webkit-color-swatch-wrapper {
            padding: 0;
        }
        input[type="color"]::-webkit-color-swatch {
            border: 1px solid #444;
            border-radius: 5px;
        }

        .preview-box {
            width: 100%;
            height: 350px;
            background-color: #000;
            border-radius: 10px;
            margin-bottom: 30px;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            border: 1px solid #333;
            position: relative;
            background-image: linear-gradient(45deg, #111 25%, transparent 25%), 
                              linear-gradient(-45deg, #111 25%, transparent 25%), 
                              linear-gradient(45deg, transparent 75%, #111 75%), 
                              linear-gradient(-45deg, transparent 75%, #111 75%);
            background-size: 20px 20px;
            background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
        }

        canvas {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .placeholder-text {
            position: absolute;
            color: #555;
            font-size: 0.9em;
            background: rgba(0,0,0,0.7);
            padding: 5px 15px;
            border-radius: 10px;
        }

        button {
            background-color: var(--gold);
            color: #000;
            border: none;
            padding: 15px 30px;
            border-radius: 30px;
            font-family: var(--font-main);
            font-weight: 600;
            font-size: 1em;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%;
            margin-bottom: 15px;
            box-shadow: 0 4px 10px rgba(223, 178, 62, 0.3);
        }

        button:hover {
            background-color: var(--gold-hover);
            transform: translateY(-2px);
        }

        button:disabled {
            background-color: #555;
            color: #888;
            cursor: not-allowed;
            box-shadow: none;
            transform: none;
        }

        #downloadBtn {
            display: none;
            background-color: transparent;
            color: var(--gold);
            border: 2px solid var(--gold);
        }

        #downloadBtn:hover {
            background-color: var(--gold);
            color: #000;
        }
    </style>
</head>
<body>

<div class="editor-container">
    <h1>Измени персонажа</h1>
    <p class="subtitle">Загрузите изображение на прозрачном фоне и выберите стиль магии</p>

    <div class="controls">
        <label class="custom-file-upload">
            <input type="file" id="imageUpload" accept="image/png, image/jpeg">
            <span id="fileName">📁 Выбрать картинку с устройства</span>
        </label>

        <select id="styleSelect">
            <option value="none">Оригинал (Без стиля)</option>
            <option value="pixel">👾 8-bit Пиксель-арт</option>
            <option value="gameboy">🎮 Ретро GameBoy</option>
            <option value="sketch">✏️ Карандашный скетч</option>
            <option value="popart">🎨 Поп-арт (Комикс)</option>
            <option value="cyberpunk">🌃 Киберпанк-неон</option>
            <option value="silhouette">🥷 Силуэт ниндзя</option>
            <option value="glitch">📺 Цифровой Глитч</option>
            <option value="ghost">👻 Призрак</option>
            <option value="hologram">💿 Голограмма</option>
        </select>

        <!-- Новая панель настроек -->
        <div class="settings-panel">
            <div class="slider-group">
                <label>Яркость <span id="brightVal">100%</span></label>
                <input type="range" id="brightnessSlider" min="10" max="200" value="100">
            </div>
            <div class="slider-group">
                <label>Интенсивность свечения <span id="glowVal">0</span></label>
                <input type="range" id="glowSlider" min="0" max="50" value="0">
            </div>
            <div class="slider-group color-picker-group">
                <label for="glowColor">Цвет свечения:</label>
                <input type="color" id="glowColor" value="#dfb23e">
            </div>
        </div>
    </div>

    <div class="preview-box">
        <span class="placeholder-text" id="placeholder">Предпросмотр</span>
        <canvas id="canvas"></canvas>
    </div>

    <button id="processBtn" disabled>Обработать картинку</button>
    <button id="downloadBtn">Скачать файл на устройство</button>
</div>

<script>
    const imageUpload = document.getElementById('imageUpload');
    const fileName = document.getElementById('fileName');
    const styleSelect = document.getElementById('styleSelect');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d', { willReadFrequently: true });
    
    // Элементы управления
    const processBtn = document.getElementById('processBtn');
    const downloadBtn = document.getElementById('downloadBtn');
    const placeholder = document.getElementById('placeholder');
    const brightnessSlider = document.getElementById('brightnessSlider');
    const glowSlider = document.getElementById('glowSlider');
    const glowColor = document.getElementById('glowColor');
    const brightVal = document.getElementById('brightVal');
    const glowVal = document.getElementById('glowVal');

    let originalImage = new Image();
    let isImageLoaded = false;
    let maxCanvasSize = 800; 

    // Загрузка картинки
    imageUpload.addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (file) {
            fileName.textContent = '📁 ' + file.name;
            const reader = new FileReader();
            reader.onload = function(event) {
                originalImage.onload = function() {
                    let scale = Math.min(maxCanvasSize / originalImage.width, maxCanvasSize / originalImage.height, 1);
                    canvas.width = originalImage.width * scale;
                    canvas.height = originalImage.height * scale;
                    
                    isImageLoaded = true;
                    placeholder.style.display = 'none';
                    
                    applyStyle();
                    resetButtons();
                }
                originalImage.src = event.target.result;
            }
            reader.readAsDataURL(file);
        }
    });

    // Слушатели событий для мгновенного обновления
    [styleSelect, brightnessSlider, glowSlider, glowColor].forEach(element => {
        element.addEventListener('input', () => {
            if (!isImageLoaded) return;
            
            // Обновление цифр
            brightVal.textContent = brightnessSlider.value + '%';
            glowVal.textContent = glowSlider.value;

            applyStyle();
            resetButtons();
        });
    });

    // Умные настройки по умолчанию при смене стиля
    styleSelect.addEventListener('change', () => {
        const s = styleSelect.value;
        if(s === 'cyberpunk') { glowColor.value = '#ff00ff'; glowSlider.value = 20; brightnessSlider.value = 100;}
        else if(s === 'silhouette') { glowColor.value = '#dfb23e'; glowSlider.value = 15; brightnessSlider.value = 100;}
        else if(s === 'ghost') { glowColor.value = '#00ffff'; glowSlider.value = 15; brightnessSlider.value = 120;}
        else if(s === 'hologram') { glowColor.value = '#0088ff'; glowSlider.value = 10; brightnessSlider.value = 150;}
        else { glowSlider.value = 0; brightnessSlider.value = 100; }
        
        brightVal.textContent = brightnessSlider.value + '%';
        glowVal.textContent = glowSlider.value;
        if (isImageLoaded) applyStyle();
    });

    function resetButtons() {
        processBtn.textContent = 'Обработать картинку';
        processBtn.disabled = false;
        downloadBtn.style.display = 'none';
    }

    processBtn.addEventListener('click', function() {
        if (!isImageLoaded) return;
        processBtn.textContent = 'Колдуем... ⚡';
        processBtn.disabled = true;

        setTimeout(() => {
            processBtn.textContent = '✨ Обработано';
            downloadBtn.style.display = 'block';
        }, 800);
    });

    // --- МАТЕМАТИЧЕСКИЕ ФИЛЬТРЫ И ОТРИСОВКА ---
    function applyStyle() {
        const style = styleSelect.value;
        const brightness = brightnessSlider.value;
        const glowV = glowSlider.value;
        const glowC = glowColor.value;

        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        // Применяем свечение и базовую яркость ко ВСЕЙ картинке
        ctx.shadowColor = glowV > 0 ? glowC : 'transparent';
        ctx.shadowBlur = parseInt(glowV);
        ctx.globalCompositeOperation = 'source-over';
        ctx.imageSmoothingEnabled = true;

        // Если это не специальные стили, требующие особых фильтров, применяем яркость тут
        if (!['cyberpunk', 'ghost', 'hologram'].includes(style)) {
            ctx.filter = `brightness(${brightness}%)`;
        }

        ctx.drawImage(originalImage, 0, 0, canvas.width, canvas.height);

        if (style === 'none') return;

        // --- Манипуляции с пикселями ---
        if (['pixel', 'gameboy', 'popart', 'glitch'].includes(style)) {
            // Пикселизация (Для лиц размер пикселя уменьшен до 3)
            let pixelSize = style === 'pixel' ? 3 : (style === 'gameboy' ? 6 : (style === 'glitch' ? 2 : 1));
            
            if (pixelSize > 1) {
                const w = Math.ceil(canvas.width / pixelSize);
                const h = Math.ceil(canvas.height / pixelSize);
                ctx.drawImage(originalImage, 0, 0, w, h);
                ctx.imageSmoothingEnabled = false;
                ctx.drawImage(canvas, 0, 0, w, h, 0, 0, canvas.width, canvas.height);
            }

            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const data = imageData.data;
            const tempData = new Uint8ClampedArray(data); // Копия для глитча

            for (let i = 0; i < data.length; i += 4) {
                if (data[i + 3] < 10) continue; 

                let r = data[i]; let g = data[i + 1]; let b = data[i + 2];

                if (style === 'pixel' || style === 'popart') {
                    // Увеличено количество уровней до 8 для сохранения деталей лица
                    let levels = style === 'popart' ? 3 : 8; 
                    let factor = 255 / (levels - 1);
                    data[i] = Math.round(r / 255 * (levels - 1)) * factor;
                    data[i+1] = Math.round(g / 255 * (levels - 1)) * factor;
                    data[i+2] = Math.round(b / 255 * (levels - 1)) * factor;
                    
                    if(style === 'popart') { 
                        data[i] = Math.min(255, data[i] * 1.5);
                        data[i+1] = Math.max(0, data[i+1] - 50);
                    }
                } 
                else if (style === 'gameboy') {
                    let avg = (r + g + b) / 3;
                    if (avg < 64) { data[i]=15; data[i+1]=56; data[i+2]=15; }
                    else if (avg < 128) { data[i]=48; data[i+1]=98; data[i+2]=48; }
                    else if (avg < 192) { data[i]=139; data[i+1]=172; data[i+2]=15; }
                    else { data[i]=155; data[i+1]=188; data[i+2]=15; }
                }
                else if (style === 'glitch') {
                    // Сдвиг каналов RGB
                    let offset = 20; // смещение
                    if (i + offset * 4 < data.length) {
                        data[i] = tempData[i + offset * 4]; // Сдвигаем красный
                    }
                    if (i - offset * 4 > 0) {
                        data[i+2] = tempData[i - offset * 4 + 2]; // Сдвигаем синий
                    }
                }
            }
            ctx.putImageData(imageData, 0, 0);
        }

        // --- Фильтры и наложение ---
        switch (style) {
            case 'sketch':
                ctx.filter = `brightness(${brightness}%) grayscale(100%) contrast(200%)`;
                ctx.drawImage(originalImage, 0, 0, canvas.width, canvas.height);
                break;
            case 'cyberpunk':
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.filter = `brightness(${brightness}%) saturate(300%) hue-rotate(90deg) contrast(150%) invert(20%)`;
                ctx.drawImage(originalImage, 0, 0, canvas.width, canvas.height);
                break;
            case 'silhouette':
                ctx.globalCompositeOperation = 'source-in';
                ctx.fillStyle = '#050505';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.globalCompositeOperation = 'source-over';
                break;
            case 'ghost':
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.globalAlpha = 0.7; // Полупрозрачность
                ctx.filter = `brightness(${brightness}%) invert(80%) grayscale(50%) hue-rotate(180deg)`;
                ctx.drawImage(originalImage, 0, 0, canvas.width, canvas.height);
                ctx.globalAlpha = 1.0;
                break;
            case 'hologram':
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.globalAlpha = 0.8;
                ctx.filter = `brightness(${brightness}%) sepia(100%) hue-rotate(180deg) saturate(300%)`;
                ctx.drawImage(originalImage, 0, 0, canvas.width, canvas.height);
                
                // Рисуем полосы сканлайны
                ctx.globalCompositeOperation = 'source-atop';
                ctx.fillStyle = 'rgba(0, 255, 255, 0.2)';
                for(let y = 0; y < canvas.height; y += 4) {
                    ctx.fillRect(0, y, canvas.width, 2);
                }
                ctx.globalCompositeOperation = 'source-over';
                ctx.globalAlpha = 1.0;
                break;
        }
    }

    // Скачивание файла
    downloadBtn.addEventListener('click', function() {
        const link = document.createElement('a');
        link.download = 'magic_character.png'; 
        link.href = canvas.toDataURL('image/png');
        link.click();
    });
</script>

</body>
</html>
