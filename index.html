<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Измени персонажа</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@700&family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #161513;
            --bg-panel: #23221f;
            --gold: #dfb23e;
            --gold-hover: #f1c75c;
            --text-light: #e0e0e0;
            --font-heading: 'Cormorant Garamond', serif;
            --font-main: 'Montserrat', sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-light);
            font-family: var(--font-main);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-image: radial-gradient(circle at 50% 0%, #302a1c 0%, var(--bg-dark) 60%);
        }

        .editor-container {
            background-color: var(--bg-panel);
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8), 0 0 15px rgba(223, 178, 62, 0.1);
            max-width: 600px;
            width: 100%;
            text-align: center;
        }

        h1 {
            font-family: var(--font-heading);
            color: var(--gold);
            font-size: 3em;
            margin-top: 0;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            letter-spacing: 2px;
        }

        p.subtitle {
            font-size: 0.9em;
            color: #a0a0a0;
            margin-bottom: 30px;
        }

        .controls {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-bottom: 30px;
        }

        input[type="file"] {
            display: none;
        }

        .custom-file-upload {
            border: 2px dashed var(--gold);
            padding: 20px;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.3s;
            color: var(--gold);
            font-weight: 600;
        }

        .custom-file-upload:hover {
            background-color: rgba(223, 178, 62, 0.1);
        }

        select {
            width: 100%;
            padding: 15px;
            background-color: var(--bg-dark);
            color: var(--text-light);
            border: 1px solid #444;
            border-radius: 25px;
            font-family: var(--font-main);
            font-size: 1em;
            outline: none;
            cursor: pointer;
            appearance: none;
            text-align: center;
        }

        .preview-box {
            width: 100%;
            height: 350px;
            background-color: #000;
            border-radius: 10px;
            margin-bottom: 30px;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            border: 1px solid #333;
            position: relative;
        }

        canvas {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .placeholder-text {
            position: absolute;
            color: #555;
            font-size: 0.9em;
        }

        button {
            background-color: var(--gold);
            color: #000;
            border: none;
            padding: 15px 30px;
            border-radius: 30px;
            font-family: var(--font-main);
            font-weight: 600;
            font-size: 1em;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%;
            margin-bottom: 15px;
            box-shadow: 0 4px 10px rgba(223, 178, 62, 0.3);
        }

        button:hover {
            background-color: var(--gold-hover);
            transform: translateY(-2px);
        }

        button:disabled {
            background-color: #555;
            color: #888;
            cursor: not-allowed;
            box-shadow: none;
            transform: none;
        }

        #downloadBtn {
            display: none;
            background-color: transparent;
            color: var(--gold);
            border: 2px solid var(--gold);
        }

        #downloadBtn:hover {
            background-color: var(--gold);
            color: #000;
        }
    </style>
</head>
<body>

<div class="editor-container">
    <h1>Измени персонажа</h1>
    <p class="subtitle">Загрузите изображение на прозрачном фоне и выберите стиль магии</p>

    <div class="controls">
        <label class="custom-file-upload">
            <input type="file" id="imageUpload" accept="image/png, image/jpeg">
            <span id="fileName">📁 Выбрать картинку с устройства</span>
        </label>

        <select id="styleSelect">
            <option value="none">Оригинал (Без стиля)</option>
            <option value="cartoon">Мультипликационный</option>
            <option value="anime">Аниме</option>
            <option value="pixel">Пиксель</option>
            <option value="minimalism">Минимализм</option>
            <option value="realism">Реализм</option>
            <option value="drawn">Рисованный стиль</option>
        </select>
    </div>

    <div class="preview-box">
        <span class="placeholder-text" id="placeholder">Предпросмотр</span>
        <canvas id="canvas"></canvas>
    </div>

    <button id="processBtn" disabled>Обработать картинку</button>
    <button id="downloadBtn">Скачать файл на устройство</button>
</div>

<script>
    const imageUpload = document.getElementById('imageUpload');
    const fileName = document.getElementById('fileName');
    const styleSelect = document.getElementById('styleSelect');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const processBtn = document.getElementById('processBtn');
    const downloadBtn = document.getElementById('downloadBtn');
    const placeholder = document.getElementById('placeholder');

    let originalImage = new Image();
    let isImageLoaded = false;

    // Загрузка картинки
    imageUpload.addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (file) {
            fileName.textContent = '📁 ' + file.name;
            const reader = new FileReader();
            reader.onload = function(event) {
                originalImage.onload = function() {
                    canvas.width = originalImage.width;
                    canvas.height = originalImage.height;
                    ctx.drawImage(originalImage, 0, 0);
                    isImageLoaded = true;
                    processBtn.disabled = false;
                    placeholder.style.display = 'none';
                    resetButtons();
                }
                originalImage.src = event.target.result;
            }
            reader.readAsDataURL(file);
        }
    });

    // Изменение стиля в селекте сбрасывает кнопки
    styleSelect.addEventListener('change', resetButtons);

    function resetButtons() {
        processBtn.textContent = 'Обработать картинку';
        processBtn.disabled = false;
        downloadBtn.style.display = 'none';
        if (isImageLoaded) {
            ctx.filter = 'none';
            ctx.drawImage(originalImage, 0, 0, canvas.width, canvas.height);
        }
    }

    // Обработка картинки (наложение фильтров)
    processBtn.addEventListener('click', function() {
        if (!isImageLoaded) return;

        // Имитация загрузки
        processBtn.textContent = 'Колдуем...';
        processBtn.disabled = true;

        setTimeout(() => {
            const style = styleSelect.value;
            applyStyle(style);
            
            processBtn.textContent = 'Обработано';
            downloadBtn.style.display = 'block';
        }, 800); // Задержка для эффекта работы программы
    });

    // Функция применения стилей
    function applyStyle(style) {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        // Сброс сглаживания (нужно для пиксель-арта)
        ctx.imageSmoothingEnabled = true;

        switch (style) {
            case 'cartoon':
                ctx.filter = 'saturate(200%) contrast(120%) brightness(110%)';
                ctx.drawImage(originalImage, 0, 0, canvas.width, canvas.height);
                break;
            case 'anime':
                ctx.filter = 'saturate(150%) contrast(110%) brightness(120%) hue-rotate(5deg)';
                ctx.drawImage(originalImage, 0, 0, canvas.width, canvas.height);
                break;
            case 'pixel':
                // Алгоритм пикселизации
                ctx.filter = 'none';
                const pixelSize = 0.05; // 5% от размера
                const w = canvas.width * pixelSize;
                const h = canvas.height * pixelSize;
                
                // Рисуем маленькую картинку
                ctx.drawImage(originalImage, 0, 0, w, h);
                
                // Отключаем сглаживание и растягиваем обратно
                ctx.imageSmoothingEnabled = false;
                ctx.drawImage(canvas, 0, 0, w, h, 0, 0, canvas.width, canvas.height);
                break;
            case 'minimalism':
                ctx.filter = 'grayscale(100%) contrast(200%) brightness(110%)';
                ctx.drawImage(originalImage, 0, 0, canvas.width, canvas.height);
                break;
            case 'realism':
                ctx.filter = 'contrast(130%) saturate(110%) sepia(10%)';
                ctx.drawImage(originalImage, 0, 0, canvas.width, canvas.height);
                break;
            case 'drawn':
                ctx.filter = 'sepia(80%) contrast(120%) saturate(80%) blur(0.5px)';
                ctx.drawImage(originalImage, 0, 0, canvas.width, canvas.height);
                break;
            default:
                ctx.filter = 'none';
                ctx.drawImage(originalImage, 0, 0, canvas.width, canvas.height);
        }
    }

    // Скачивание файла
    downloadBtn.addEventListener('click', function() {
        const link = document.createElement('a');
        link.download = 'magic_character.png'; // Скачивается в формате PNG с прозрачностью
        link.href = canvas.toDataURL('image/png');
        link.click();
    });
</script>

</body>
</html>
